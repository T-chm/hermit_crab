<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermit Crab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Roboto', 'system-ui', 'sans-serif'],
      },
      colors: {
        md: {
          primary:                '#c586f7',
          'on-primary':           '#1a0a2e',
          'primary-ctr':          '#2d1b4e',
          'on-primary-ctr':       '#e0c0ff',
          secondary:              '#f472b6',
          'secondary-ctr':        '#6b2c47',
          error:                  '#ffb4ab',
          'error-ctr':            '#93000a',
          surface:                '#0a0a1a',
          'surface-ctr-low':      '#0f0f24',
          'surface-ctr':          '#141428',
          'surface-ctr-high':     '#1c1c36',
          'surface-ctr-highest':  '#252545',
          'on-surface':           '#e8e4f0',
          'on-surface-var':       '#a8a4b4',
          outline:                '#6e6a7a',
          'outline-var':          '#2e2b4a',
        }
      },
      boxShadow: {
        'md-1': '0 1px 3px rgba(0,0,0,0.5), 0 0 8px rgba(140,80,220,0.08)',
        'md-2': '0 3px 8px rgba(0,0,0,0.4), 0 0 12px rgba(140,80,220,0.1)',
        'md-3': '0 6px 16px rgba(0,0,0,0.35), 0 0 20px rgba(140,80,220,0.12)',
      }
    }
  }
}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --md-primary:               #c586f7;
  --md-on-primary:            #1a0a2e;
  --md-primary-ctr:           #2d1b4e;
  --md-on-primary-ctr:        #e0c0ff;
  --md-secondary:             #f472b6;
  --md-secondary-ctr:         #6b2c47;
  --md-error:                 #ffb4ab;
  --md-surface:               #0a0a1a;
  --md-surface-ctr-low:       #0f0f24;
  --md-surface-ctr:           #141428;
  --md-surface-ctr-high:      #1c1c36;
  --md-surface-ctr-highest:   #252545;
  --md-on-surface:            #e8e4f0;
  --md-on-surface-var:        #a8a4b4;
  --md-outline:               #6e6a7a;
  --md-outline-var:           #2e2b4a;
  --md-glow:                  rgba(160,100,240,0.15);
  --md-glow-border:           rgba(160,100,240,0.3);
  --md-gradient:              linear-gradient(135deg, #e040a0, #8040e0);
}

html, body { height: 100%; }
.material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* ---- Animations ---- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(244,114,182,0.25); }
  50%      { box-shadow: 0 0 0 14px rgba(244,114,182,0.05); }
}
@keyframes glowPulse {
  0%, 100% { border-color: var(--md-glow-border); box-shadow: 0 0 12px var(--md-glow); }
  50%      { border-color: rgba(160,100,240,0.5); box-shadow: 0 0 20px rgba(160,100,240,0.25); }
}
@keyframes dots {
  0%,20%  { content: '.'; }
  40%     { content: '..'; }
  60%,100%{ content: '...'; }
}

/* ---- Scrollbar ---- */
#chat::-webkit-scrollbar { width: 8px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(160,100,240,0.2); border-radius: 4px; }
#chat::-webkit-scrollbar-thumb:hover { background: rgba(160,100,240,0.4); }
#quick-actions::-webkit-scrollbar { display: none; }

/* ================================================================
   Dynamic element styles (created by JavaScript)
   ================================================================ */

/* ---- Messages ---- */
.msg {
  max-width: 78%; padding: 10px 16px; border-radius: 14px;
  line-height: 1.55; white-space: pre-wrap; word-wrap: break-word;
  animation: fadeIn 0.25s ease; font-size: 0.875rem;
}
.msg.user {
  align-self: flex-end; background: var(--md-primary-ctr); color: var(--md-on-primary-ctr);
  border-bottom-right-radius: 4px;
  border: 1px solid rgba(160,100,240,0.2);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 8px rgba(160,100,240,0.08);
}
.msg.assistant {
  align-self: flex-start; background: var(--md-surface-ctr-high); color: var(--md-on-surface);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--md-outline-var);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.msg.system {
  align-self: center; color: var(--md-on-surface-var); font-size: 0.813rem;
  background: none; padding: 6px 0;
}
.msg.error {
  align-self: center; color: var(--md-error); font-size: 0.813rem;
  background: rgba(255,180,171,0.08); border: 1px solid rgba(255,180,171,0.2);
  border-radius: 10px;
}
.msg.thinking {
  align-self: flex-start; color: var(--md-on-surface-var); font-size: 0.813rem;
  background: rgba(160,100,240,0.04); border: 1px solid rgba(160,100,240,0.15);
  font-style: italic; max-height: 80px; overflow-y: auto; border-radius: 10px;
}
.thinking-label {
  color: var(--md-primary); font-weight: 500; font-style: normal;
  font-size: 0.688rem; text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 4px; display: block;
}
.thinking-dots::after { content: '...'; animation: dots 1.5s infinite steps(1); }

.msg code {
  background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px;
  font-family: 'Roboto Mono', 'SF Mono', monospace; font-size: 0.813rem;
}
.msg pre {
  background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px;
  overflow-x: auto; margin: 8px 0;
}
.msg pre code { background: none; padding: 0; }

/* ---- Tool Cards ---- */
.tool-card {
  align-self: flex-start; width: 92%; max-width: 480px;
  background: var(--md-surface-ctr); color: var(--md-on-surface);
  border-radius: 12px; border: 1px solid var(--md-glow-border);
  border-left: 3px solid var(--md-primary);
  padding: 14px 18px; animation: fadeIn 0.25s ease; font-size: 0.875rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px var(--md-glow);
}
.tool-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.tool-icon { font-size: 1.125rem; line-height: 1; }
.tool-label {
  font-weight: 500; font-size: 0.688rem; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--md-primary);
}
.tool-detail { color: var(--md-on-surface-var); font-size: 0.813rem; margin-left: auto; }
.tool-body { color: var(--md-on-surface); line-height: 1.55; }
.tool-result-text {
  white-space: pre-wrap; word-wrap: break-word; font-size: 0.813rem;
  max-height: 260px; overflow-y: auto; margin: 0;
  background: none; border: none; padding: 0; color: var(--md-on-surface);
  font-family: inherit;
}
.tool-actions {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--md-outline-var); flex-wrap: wrap;
}
.tool-actions button {
  background: var(--md-surface-ctr-high); border: 1px solid var(--md-outline-var);
  color: var(--md-on-surface); padding: 6px 14px; border-radius: 16px;
  cursor: pointer; font-size: 0.813rem; transition: all 0.2s; font-family: inherit;
  font-weight: 500;
}
.tool-actions button:hover {
  background: var(--md-primary); color: var(--md-on-primary);
  border-color: var(--md-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* Loading */
.tool-card.loading .tool-body { color: var(--md-on-surface-var); font-style: italic; }
.tool-card.loading .tool-body::after { content: '...'; animation: dots 1.5s infinite steps(1); }

/* Error */
.tool-card.tool-error { border-left-color: var(--md-error); }
.tool-card.tool-error .tool-label { color: var(--md-error); }

/* Tool accent colors */
.tool-card.tool-weather { border-left-color: #64b5f6; }
.tool-card.tool-weather .tool-label { color: #64b5f6; }
.tool-card.tool-music_control { border-left-color: #f48fb1; }
.tool-card.tool-music_control .tool-label { color: #f48fb1; }
.tool-card.tool-smart_home { border-left-color: #ffd54f; }
.tool-card.tool-smart_home .tool-label { color: #ffd54f; }
.tool-card.tool-reminders { border-left-color: #81c784; }
.tool-card.tool-reminders .tool-label { color: #81c784; }
.tool-card.tool-notes { border-left-color: #ce93d8; }
.tool-card.tool-notes .tool-label { color: #ce93d8; }
.tool-card.tool-summarize { border-left-color: #b39ddb; }
.tool-card.tool-summarize .tool-label { color: #b39ddb; }
.tool-card.tool-messaging { border-left-color: #4dd0e1; }
.tool-card.tool-messaging .tool-label { color: #4dd0e1; }

/* ---- Music ---- */
.music-info { display: flex; flex-direction: column; gap: 2px; }
.music-track { font-weight: 500; font-size: 0.938rem; }
.music-artist { color: var(--md-on-surface-var); font-size: 0.813rem; }
.music-status { font-size: 0.813rem; color: var(--md-on-surface-var); }

/* ---- Smart Home ---- */
.smart-status { display: flex; align-items: center; gap: 10px; font-size: 0.875rem; }
.smart-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.smart-dot.on { background: #81c784; box-shadow: 0 0 8px #81c78488; }
.smart-dot.off { background: var(--md-outline); }
.smart-target { font-weight: 500; }
.smart-state { color: var(--md-on-surface-var); font-size: 0.688rem; text-transform: uppercase; letter-spacing: 0.8px; }
.smart-brightness { margin-top: 8px; height: 4px; background: var(--md-surface-ctr-high); border-radius: 2px; overflow: hidden; }
.smart-brightness-fill { height: 100%; background: var(--md-primary); border-radius: 2px; transition: width 0.3s; }

/* ---- Reminders ---- */
.reminder-list { display: flex; flex-direction: column; gap: 6px; }
.reminder-item { display: flex; align-items: flex-start; gap: 10px; padding: 4px 0; font-size: 0.813rem; }
.reminder-check { color: var(--md-on-surface-var); flex-shrink: 0; }
.reminder-added { display: flex; align-items: center; gap: 10px; font-size: 0.875rem; }
.reminder-due { margin-left: auto; color: var(--md-on-surface-var); font-size: 0.75rem; }

/* ---- Notes ---- */
.note-inner {
  background: rgba(160,100,240,0.06); border: 1px solid rgba(160,100,240,0.15);
  border-radius: 10px; padding: 10px 14px;
}
.note-title { font-weight: 500; font-size: 0.875rem; margin-bottom: 4px; }
.note-preview { color: var(--md-on-surface-var); font-size: 0.813rem; }
.notes-list { display: flex; flex-direction: column; gap: 4px; }
.notes-list-item { font-size: 0.813rem; padding: 3px 0; }

/* ---- Summarize ---- */
.summary-source { font-size: 0.688rem; color: var(--md-on-surface-var); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
.summary-text { font-size: 0.813rem; line-height: 1.65; }

/* ---- Messaging ---- */
.msg-sent { display: flex; flex-direction: column; gap: 4px; }
.msg-to { font-size: 0.75rem; color: var(--md-on-surface-var); }
.msg-bubble {
  background: var(--md-primary-ctr); color: var(--md-on-primary-ctr);
  padding: 8px 14px; border-radius: 12px; border-bottom-right-radius: 4px;
  align-self: flex-start; font-size: 0.813rem; max-width: 90%;
}
.msg-status-sent { font-size: 0.688rem; color: #81c784; align-self: flex-end; }
.msg-history { display: flex; flex-direction: column; gap: 4px; }
.msg-history-item { font-size: 0.813rem; padding: 3px 0; }
.msg-history-item .msg-sender {
  font-weight: 500; font-size: 0.688rem; text-transform: uppercase;
  color: var(--md-on-surface-var); margin-right: 8px; letter-spacing: 0.3px;
}

/* ---- Mic button states ---- */
#mic-btn.listening {
  background: var(--md-primary-ctr) !important;
  border-color: var(--md-primary) !important;
  color: var(--md-primary) !important;
  box-shadow: 0 0 0 3px rgba(160,100,240,0.2), 0 0 10px rgba(160,100,240,0.15);
}
#mic-btn.recording {
  background: rgba(244,114,182,0.15) !important;
  border-color: var(--md-secondary) !important;
  color: var(--md-secondary) !important;
  animation: pulse 1s infinite;
}
#mic-btn.processing {
  border-color: var(--md-primary) !important; color: var(--md-primary) !important;
  pointer-events: none; opacity: 0.6;
}

/* ---- Connection dot ---- */
#connection-dot.connected { background: #81c784 !important; }

/* ================================================================
   Agent Mode
   ================================================================ */
@keyframes agentPulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.agent-container {
  align-self: stretch; width: 100%;
  background: var(--md-surface-ctr-low);
  border: 1px solid rgba(160,100,240,0.25);
  border-left: 3px solid var(--md-primary);
  border-radius: 12px; padding: 0;
  animation: fadeIn 0.3s ease;
  overflow: hidden;
  box-shadow: 0 0 16px var(--md-glow);
}
.agent-header {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 18px; background: rgba(160,100,240,0.06);
  border-bottom: 1px solid rgba(160,100,240,0.12);
}
.agent-badge {
  background: var(--md-primary); color: var(--md-on-primary);
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; padding: 3px 8px; border-radius: 4px;
}
.agent-badge.running { animation: agentPulse 2s infinite; }
.agent-badge.done { background: #81c784; }
.agent-badge.stopped { background: var(--md-outline); }
.agent-badge.error { background: var(--md-error); }
.agent-goal {
  flex: 1; font-size: 0.813rem; color: var(--md-on-surface);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.agent-stop-btn {
  background: rgba(255,180,171,0.1); border: 1px solid rgba(255,180,171,0.3);
  color: var(--md-error); padding: 4px 12px; border-radius: 10px;
  cursor: pointer; font-size: 0.75rem; font-weight: 500; font-family: inherit;
  transition: all 0.2s;
}
.agent-stop-btn:hover {
  background: rgba(255,180,171,0.2); border-color: var(--md-error);
}

.agent-plan {
  padding: 12px 18px;
  border-bottom: 1px solid var(--md-outline-var);
}
.agent-plan-title {
  font-size: 0.625rem; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--md-primary); margin-bottom: 8px;
}
.agent-plan-list {
  list-style: none; display: flex; flex-direction: column; gap: 6px;
}
.agent-plan-item {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 0.813rem; color: var(--md-on-surface-var);
}
.agent-plan-num {
  color: var(--md-primary); font-weight: 700; font-size: 0.688rem;
  min-width: 18px; text-align: center; padding-top: 1px;
}
.agent-plan-item.active { color: var(--md-on-surface); font-weight: 500; }
.agent-plan-item.done { color: var(--md-on-surface-var); opacity: 0.6; }
.agent-plan-item.done .agent-plan-num { color: #81c784; }

.agent-steps {
  display: flex; flex-direction: column;
}
.agent-step {
  padding: 12px 18px;
  border-bottom: 1px solid var(--md-outline-var);
}
.agent-step:last-child { border-bottom: none; }
.agent-step-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.agent-step-num {
  background: rgba(160,100,240,0.15); color: var(--md-primary);
  width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.625rem; font-weight: 700; flex-shrink: 0;
}
.agent-step.completed .agent-step-num {
  background: rgba(129,199,132,0.15); color: #81c784;
}
.agent-step-desc {
  font-size: 0.813rem; color: var(--md-on-surface); font-weight: 500;
}
.agent-step-status {
  margin-left: auto; font-size: 0.625rem; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--md-on-surface-var);
}
.agent-step-body {
  margin-left: 30px; font-size: 0.813rem; color: var(--md-on-surface-var);
  line-height: 1.5;
}
.agent-step-body .tool-card {
  width: 100%; max-width: 100%; margin-top: 6px;
  font-size: 0.813rem;
}
.agent-step-text {
  white-space: pre-wrap; word-wrap: break-word;
  margin-top: 4px; font-size: 0.813rem;
}

.agent-summary {
  padding: 12px 18px;
  background: rgba(129,199,132,0.06);
  border-top: 1px solid rgba(129,199,132,0.15);
}
.agent-summary-title {
  font-size: 0.625rem; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.8px; color: #81c784; margin-bottom: 6px;
}
.agent-summary-text {
  font-size: 0.813rem; color: var(--md-on-surface); line-height: 1.55;
}

/* Agent mode toggle highlight */
#agent-toggle:checked + span { color: var(--md-primary); }

/* ================================================================
   Memory
   ================================================================ */
.memory-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--md-surface-ctr-high); border: 1px solid var(--md-outline-var);
  border-radius: 16px; padding: 3px 10px 3px 7px;
  cursor: pointer; transition: all 0.2s; font-size: 0.75rem;
  color: var(--md-on-surface-var); user-select: none;
}
.memory-chip:hover {
  border-color: var(--md-primary); color: var(--md-primary);
}
.memory-chip.has-facts {
  border-color: rgba(160,100,240,0.3); color: var(--md-primary);
}
.memory-chip .mem-icon { font-size: 0.875rem; line-height: 1; }
.memory-chip .mem-count { font-weight: 500; }

.memory-panel {
  display: none; position: absolute; top: 100%; right: 0; margin-top: 6px;
  width: 320px; max-height: 380px; overflow-y: auto;
  background: var(--md-surface-ctr); border: 1px solid var(--md-glow-border);
  border-radius: 12px; padding: 0;
  box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 16px var(--md-glow);
  z-index: 50; animation: fadeIn 0.15s ease;
}
.memory-panel.open { display: block; }
.memory-panel-section {
  padding: 10px 14px; border-bottom: 1px solid var(--md-outline-var);
}
.memory-panel-section:last-child { border-bottom: none; }
.memory-panel-title {
  font-size: 0.625rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--md-primary); margin-bottom: 6px;
}
.memory-fact {
  font-size: 0.75rem; color: var(--md-on-surface); padding: 2px 0;
  line-height: 1.45;
}
.memory-session {
  font-size: 0.75rem; color: var(--md-on-surface-var); padding: 3px 0;
  line-height: 1.45;
}
.memory-session-date {
  font-size: 0.625rem; color: var(--md-outline); margin-right: 5px;
}
.memory-working {
  font-size: 0.75rem; color: var(--md-on-surface-var);
  font-style: italic; line-height: 1.45;
}
.memory-empty {
  font-size: 0.75rem; color: var(--md-outline); font-style: italic;
}
.memory-clear-btn {
  width: 100%; background: transparent; border: 1px solid rgba(255,180,171,0.2);
  color: var(--md-error); padding: 6px; border-radius: 8px;
  cursor: pointer; font-size: 0.75rem; font-weight: 500; font-family: inherit;
  transition: all 0.2s; margin-top: 3px;
}
.memory-clear-btn:hover {
  background: rgba(255,180,171,0.08); border-color: var(--md-error);
}
</style>
</head>
<body class="h-screen overflow-hidden font-sans bg-md-surface text-md-on-surface">
<div id="app" class="flex flex-col h-dvh max-w-[1200px] mx-auto">

  <!-- ==================== Header ==================== -->
  <header class="flex items-center justify-between px-5 py-3 shrink-0 bg-md-surface-ctr-low border-b border-md-outline-var shadow-md-1">
    <div class="flex items-center gap-3">
      <h1 class="text-base font-bold tracking-tight">
        <span>&#129408;</span> Hermit Crab
      </h1>
      <div id="connection-dot" class="w-2 h-2 rounded-full bg-md-error transition-colors duration-300" title="Disconnected"></div>
      <span id="status-text" class="text-xs text-md-on-surface-var max-w-[240px] overflow-hidden text-ellipsis whitespace-nowrap">Connecting...</span>
    </div>
    <div class="flex items-center gap-3 relative">
      <div id="memory-chip" class="memory-chip" onclick="toggleMemoryPanel()" title="Memory">
        <span class="mem-icon">&#129504;</span>
        <span id="mem-count" class="mem-count">0</span>
      </div>
      <div id="memory-panel" class="memory-panel">
        <div class="memory-panel-section">
          <div class="memory-panel-title">Core Facts</div>
          <div id="mem-facts"><span class="memory-empty">No facts stored yet</span></div>
        </div>
        <div class="memory-panel-section">
          <div class="memory-panel-title">Recent Sessions</div>
          <div id="mem-sessions"><span class="memory-empty">No past sessions</span></div>
        </div>
        <div class="memory-panel-section">
          <div class="memory-panel-title">Working Memory</div>

        <input type="range" id="sensitivity-slider" min="3" max="60" value="15" class="w-20 accent-[#c586f7]">

      </label>

      </label>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ws = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let mediaRecorder = null;

let isListening = false;
let isRecording = false;
let isProcessing = false;

let vadSpeechStart = 0;
let silenceTimer = null;

const MIN_SPEECH_MS = 300;
const SILENCE_MS = 1500;

// DOM
const chat = document.getElementById('chat');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const alwaysOnToggle = document.getElementById('always-on-toggle');
const sensitivitySlider = document.getElementById('sensitivity-slider');
const ttsToggle = document.getElementById('tts-toggle');
const thinkToggle = document.getElementById('think-toggle');
const clearBtn = document.getElementById('clear-btn');
const statusText = document.getElementById('status-text');
const connDot = document.getElementById('connection-dot');
const volumeFill = document.getElementById('volume-fill');
const thresholdLine = document.getElementById('threshold-line');
const modelSelect = document.getElementById('model-select');

let currentAssistantEl = null;
let currentThinkingEl = null;
let currentToolCard = null;

// Memory state
const memoryChip = document.getElementById('memory-chip');
const memoryPanel = document.getElementById('memory-panel');
const memCountEl = document.getElementById('mem-count');
const memFactsEl = document.getElementById('mem-facts');
const memSessionsEl = document.getElementById('mem-sessions');
const memWorkingEl = document.getElementById('mem-working');

// Agent mode state
const agentToggle = document.getElementById('agent-toggle');
let agentContainerEl = null;
let agentStepsEl = null;
let agentCurrentStepEl = null;
let agentCurrentStepBody = null;
let agentPlanItems = [];
let agentRunning = false;

// ---------------------------------------------------------------------------
// Tool metadata
// ---------------------------------------------------------------------------
const TOOL_META = {
  weather:       { icon: '\u26C5', label: 'Weather',    accent: '#64b5f6' },
  music_control: { icon: '\uD83C\uDFB5', label: 'Music',      accent: '#f48fb1' },
  smart_home:    { icon: '\uD83D\uDCA1', label: 'Smart Home',  accent: '#ffd54f' },
  reminders:     { icon: '\u2705', label: 'Reminders',   accent: '#81c784' },
  notes:         { icon: '\uD83D\uDCDD', label: 'Notes',       accent: '#ce93d8' },
  summarize:     { icon: '\uD83D\uDCC4', label: 'Summary',     accent: '#b39ddb' },
  messaging:     { icon: '\uD83D\uDCAC', label: 'Messages',    accent: '#4dd0e1' },
};

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connDot.classList.add('connected');
    connDot.title = 'Connected';
    setStatus('Ready');
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  };

  ws.onclose = () => {
    connDot.classList.remove('connected');
    connDot.title = 'Disconnected';
    setStatus('Disconnected. Reconnecting...');
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {};

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleServerMsg(data);
  };
}

function handleServerMsg(data) {
  switch (data.type) {
    case 'transcription':
      addMessage('user', data.text);
      setStatus('Thinking...');
      break;

    case 'llm_start':
      setStatus('Waiting for model...');
      break;

    case 'thinking_start':
      currentThinkingEl = addMessage('thinking', '');
      currentThinkingEl.innerHTML = '<span class="thinking-label">Deep thinking<span class="thinking-dots"></span></span>';
      setStatus('Deep thinking...');
      break;

    case 'thinking_token':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) {
          const textNode = document.createTextNode(data.token);
          currentThinkingEl.appendChild(textNode);
        } else {
          currentThinkingEl.appendChild(document.createTextNode(data.token));
        }
        currentThinkingEl.scrollTop = currentThinkingEl.scrollHeight;
        scrollToBottom();
      }
      break;

    case 'thinking_done':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) label.innerHTML = 'Thought';
        currentThinkingEl.style.maxHeight = '40px';
        currentThinkingEl = null;
      }
      currentAssistantEl = addMessage('assistant', '');
      setStatus('Responding...');
      break;

    case 'llm_token':
      if (!currentAssistantEl) {
        currentAssistantEl = addMessage('assistant', '');
        setStatus('Responding...');
      }
      currentAssistantEl.textContent += data.token;
      scrollToBottom();
      break;

    case 'llm_done':
      if (currentAssistantEl) {
        renderMarkdown(currentAssistantEl, data.text);
      }
      currentAssistantEl = null;
      currentThinkingEl = null;
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        // Show timing info briefly then go idle
        if (data.timing) {
          const tt = data.timing.total_ms;
          const ts = tt >= 1000 ? (tt/1000).toFixed(1) + 's' : tt + 'ms';
          setStatus('Done in ' + ts);
          setTimeout(() => setStatus('idle'), 3000);
        } else {
          setStatus('idle');
        }
        updateMicState();
      }
      if (ttsToggle.checked && data.text) {
        speak(data.text);
      }
      break;

    case 'think_decision':
      if (data.enabled) {
        addMessage('system', 'Deep thinking enabled for this query');
      }
      break;

    case 'tool_call':
      currentToolCard = addToolCallCard(data.name, data.args);
      {
        const meta = TOOL_META[data.name];
        const label = meta ? meta.icon + ' Running ' + meta.label : 'Running ' + data.name;
        setStatus(label + '...');
      }
      break;

    case 'tool_result':
      if (currentToolCard) {
        updateToolCard(currentToolCard, data.name, data.args, data.result);
        currentToolCard = null;
      }
      setStatus('Composing response...');
      break;

    case 'status':
      setStatus(data.text);
      break;

    case 'error':
      addMessage('error', data.text);
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      break;

    case 'cleared':
      chat.innerHTML = '<div class="msg system">Conversation cleared.</div>';
      break;

    case 'model_set':
      addMessage('system', 'Model set to ' + data.model);
      break;

    // --- Memory ---
    case 'memory_status':
      updateMemoryChip(data.facts_count, data.sessions_count, data.working_summary);
      break;

    case 'memory_detail':
      renderMemoryPanel(data.facts, data.sessions, data.working);
      break;

    // --- Agent Mode ---
    case 'agent_start':
      agentRunning = true;
      agentContainerEl = document.createElement('div');
      agentContainerEl.className = 'agent-container';
      agentContainerEl.innerHTML =
        '<div class="agent-header">' +
          '<span class="agent-badge running">AGENT</span>' +
          '<span class="agent-goal">' + escapeHtml(data.goal) + '</span>' +
          '<button class="agent-stop-btn" onclick="stopAgent()">Stop</button>' +
        '</div>';
      agentStepsEl = document.createElement('div');
      agentStepsEl.className = 'agent-steps';
      agentContainerEl.appendChild(agentStepsEl);
      chat.appendChild(agentContainerEl);
      setStatus('Agent: Planning...');
      scrollToBottom();
      break;

    case 'agent_plan':
      if (agentContainerEl) {
        var planEl = document.createElement('div');
        planEl.className = 'agent-plan';
        planEl.innerHTML = '<div class="agent-plan-title">Plan</div>';
        var listEl = document.createElement('div');
        listEl.className = 'agent-plan-list';
        agentPlanItems = [];
        (data.steps || []).forEach(function(s, idx) {
          var item = document.createElement('div');
          item.className = 'agent-plan-item';
          item.innerHTML = '<span class="agent-plan-num">' + (idx+1) + '</span><span>' + escapeHtml(s) + '</span>';
          listEl.appendChild(item);
          agentPlanItems.push(item);
        });
        planEl.appendChild(listEl);
        agentContainerEl.insertBefore(planEl, agentStepsEl);
        scrollToBottom();
      }
      break;

    case 'agent_plan_revised':
      // Update plan items for remaining steps
      if (data.steps && data.steps.length > 0) {
        addMessage('system', 'Agent revised plan: ' + data.steps.length + ' steps remaining');
      }
      break;

    case 'agent_step_start':
      if (agentStepsEl) {
        // Mark current plan item as active
        if (agentPlanItems[data.step - 1]) {
          agentPlanItems.forEach(function(item) { item.classList.remove('active'); });
          agentPlanItems[data.step - 1].classList.add('active');
        }
        agentCurrentStepEl = document.createElement('div');
        agentCurrentStepEl.className = 'agent-step';
        agentCurrentStepEl.innerHTML =
          '<div class="agent-step-header">' +
            '<span class="agent-step-num">' + data.step + '</span>' +
            '<span class="agent-step-desc">' + escapeHtml(data.description || 'Step ' + data.step) + '</span>' +
            '<span class="agent-step-status">running</span>' +
          '</div>';
        agentCurrentStepBody = document.createElement('div');
        agentCurrentStepBody.className = 'agent-step-body';
        agentCurrentStepEl.appendChild(agentCurrentStepBody);
        agentStepsEl.appendChild(agentCurrentStepEl);
        setStatus('Agent: Step ' + data.step + ' of ' + (data.total || '?') + '...');
        scrollToBottom();
      }
      break;

    case 'agent_token':
      if (agentCurrentStepBody) {
        var textEl = agentCurrentStepBody.querySelector('.agent-step-text');
        if (!textEl) {
          textEl = document.createElement('div');
          textEl.className = 'agent-step-text';
          agentCurrentStepBody.appendChild(textEl);
        }
        textEl.textContent += data.token;
        scrollToBottom();
      }
      break;

    case 'agent_tool_call':
      if (agentCurrentStepBody) {
        currentToolCard = addToolCallCard(data.name, data.args, agentCurrentStepBody);
        scrollToBottom();
      }
      break;

    case 'agent_tool_result':
      if (currentToolCard) {
        updateToolCard(currentToolCard, data.name, data.args, data.result);
        currentToolCard = null;
        scrollToBottom();
      }
      break;

    case 'agent_step_done':
      if (agentCurrentStepEl) {
        agentCurrentStepEl.classList.add('completed');
        var statusEl = agentCurrentStepEl.querySelector('.agent-step-status');
        if (statusEl) statusEl.textContent = 'done';
        // Mark plan item as done
        if (agentPlanItems[data.step - 1]) {
          agentPlanItems[data.step - 1].classList.remove('active');
          agentPlanItems[data.step - 1].classList.add('done');
        }
      }
      agentCurrentStepEl = null;
      agentCurrentStepBody = null;
      break;

    case 'agent_done':
      agentRunning = false;
      if (agentContainerEl) {
        // Update badge
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('done'); badge.textContent = 'DONE'; }
        // Remove stop button
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
        // Add summary
        if (data.summary) {
          var summaryEl = document.createElement('div');
          summaryEl.className = 'agent-summary';
          summaryEl.innerHTML =
            '<div class="agent-summary-title">Summary</div>' +
            '<div class="agent-summary-text">' + escapeHtml(data.summary) + '</div>';
          agentContainerEl.appendChild(summaryEl);
        }
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;

    case 'agent_error':
      agentRunning = false;
      if (agentContainerEl) {
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('error'); badge.textContent = 'ERROR'; }
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
        var errEl = document.createElement('div');
        errEl.className = 'agent-summary';
        errEl.style.background = 'rgba(255,180,171,0.06)';
        errEl.style.borderTopColor = 'rgba(255,180,171,0.15)';
        errEl.innerHTML =
          '<div class="agent-summary-title" style="color:var(--md-error)">Error</div>' +
          '<div class="agent-summary-text" style="color:var(--md-error)">' + escapeHtml(data.text || 'Unknown error') + '</div>';
        agentContainerEl.appendChild(errEl);
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;

    case 'agent_stopped':
      agentRunning = false;
      if (agentContainerEl) {
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('stopped'); badge.textContent = 'STOPPED'; }
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;
  }
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'assistant' && text) {
    renderMarkdown(el, text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

function renderMarkdown(el, text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------------
// Tool card rendering
// ---------------------------------------------------------------------------
function addToolCallCard(name, args, parentEl) {
  const meta = TOOL_META[name] || { icon: '\uD83D\uDD27', label: name, accent: '#888' };
  const el = document.createElement('div');
  el.className = 'tool-card tool-' + name + ' loading';

  const detail = getToolDetail(name, args);

  el.innerHTML =
    '<div class="tool-header">' +
      '<span class="tool-icon">' + meta.icon + '</span>' +
      '<span class="tool-label">' + meta.label + '</span>' +
      (detail ? '<span class="tool-detail">' + escapeHtml(detail) + '</span>' : '') +
    '</div>' +
    '<div class="tool-body">Working on it</div>';

  (parentEl || chat).appendChild(el);
  scrollToBottom();
  return el;
}

function getToolDetail(name, args) {
  switch (name) {
    case 'weather': return args.location || '';
    case 'music_control': return formatMusicAction(args);
    case 'smart_home': return args.target || formatAction(args.action);
    case 'reminders': return args.title || formatAction(args.action);
    case 'notes': return args.title || formatAction(args.action);
    case 'summarize': return args.url ? getDomain(args.url) : '';
    case 'messaging':
      if (args.action === 'send') return '\u2192 ' + (args.to || '');
      return formatAction(args.action);
    default: return '';
  }
}

function formatAction(action) {
  return action ? action.replace(/_/g, ' ') : '';
}

function formatMusicAction(args) {
  const a = args.action || '';
  if (a === 'play_song' || a === 'play_artist' || a === 'play_album') {
    return (args.query || '') + (args.artist ? ' \u2022 ' + args.artist : '');
  }
  if (a === 'search') return 'search: ' + (args.query || '');
  return a.replace(/_/g, ' ');
}

function updateToolCard(el, name, args, result) {
  el.classList.remove('loading');

  const isError = result.startsWith('Error') || result.includes('not installed');
  if (isError) el.classList.add('tool-error');

  const detailEl = el.querySelector('.tool-detail');
  const newDetail = getResultDetail(name, args, result);
  if (detailEl && newDetail) detailEl.textContent = newDetail;

  const bodyEl = el.querySelector('.tool-body');
  bodyEl.innerHTML = renderToolBody(name, args, result);

  if (!isError) {
    const actionsHtml = renderToolActions(name, args);
    if (actionsHtml) {
      const actionsEl = document.createElement('div');
      actionsEl.className = 'tool-actions';
      actionsEl.innerHTML = actionsHtml;
      el.appendChild(actionsEl);
    }
  }

  scrollToBottom();
}

function getResultDetail(name, args, result) {
  if (name === 'music_control') {
    const app = (args.app === 'spotify') ? 'Spotify' : 'Apple Music';
    return app;
  }
  return null;
}

// ---------------------------------------------------------------------------
// Tool body renderers
// ---------------------------------------------------------------------------
function renderToolBody(name, args, result) {
  switch (name) {
    case 'weather':       return renderWeatherBody(result);
    case 'music_control': return renderMusicBody(args, result);
    case 'smart_home':    return renderSmartHomeBody(args, result);
    case 'reminders':     return renderRemindersBody(args, result);
    case 'notes':         return renderNotesBody(args, result);
    case 'summarize':     return renderSummarizeBody(args, result);
    case 'messaging':     return renderMessagingBody(args, result);
    default:              return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
  }
}

function renderWeatherBody(result) {
  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

function renderMusicBody(args, result) {
  const npMatch = result.match(/Now playing[^:]*:\s*(.+)/);
  if (npMatch) {
    const info = npMatch[1];
    const commaParts = info.split(/,\s*/);
    if (commaParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(commaParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(commaParts.slice(1).join(' \u2022 ')) + '</div>' +
      '</div>';
    }
    const byParts = info.split(/ by /);
    if (byParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(byParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(byParts.slice(1).join(' by ')) + '</div>' +
      '</div>';
    }
    return '<div class="music-info"><div class="music-track">' + escapeHtml(info) + '</div></div>';
  }

  const playingMatch = result.match(/Playing (.+?) on (Spotify|Apple Music)/);
  if (playingMatch) {
    return '<div class="music-info">' +
      '<div class="music-track">' + escapeHtml(playingMatch[1]) + '</div>' +
      '<div class="music-artist">' + escapeHtml(playingMatch[2]) + '</div>' +
    '</div>';
  }

  if (result.includes('\n')) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }

  return '<div class="music-status">' + escapeHtml(result) + '</div>';
}

function renderSmartHomeBody(args, result) {
  const action = args.action || '';

  if (action === 'turn_on' || action === 'turn_off') {
    const isOn = action === 'turn_on';
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot ' + (isOn ? 'on' : 'off') + '"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + (isOn ? 'ON' : 'OFF') + '</span>' +
    '</div>';
  }

  if (action === 'set_brightness') {
    const val = parseInt(args.value) || 50;
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot on"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + val + '%</span>' +
    '</div>' +
    '<div class="smart-brightness"><div class="smart-brightness-fill" style="width:' + val + '%"></div></div>';
  }

  if (action === 'set_color') {
    const target = args.target || 'Light';
    const color = args.value || '';
    return '<div class="smart-status">' +
      '<div class="smart-dot on" style="background:' + escapeHtml(color) + ';box-shadow:0 0 6px ' + escapeHtml(color) + '88"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + escapeHtml(color) + '</span>' +
    '</div>';
  }

  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

function renderRemindersBody(args, result) {
  if (args.action === 'add') {
    return '<div class="reminder-added">' +
      '<span class="reminder-check">\u2610</span>' +
      '<span>' + escapeHtml(args.title || result) + '</span>' +
      (args.due ? '<span class="reminder-due">' + escapeHtml(args.due) + '</span>' : '') +
    '</div>';
  }

  const lines = result.split('\n').filter(function(l) { return l.trim(); });
  if (lines.length > 1) {
    return '<div class="reminder-list">' +
      lines.map(function(l) {
        return '<div class="reminder-item">' +
          '<span class="reminder-check">\u2610</span>' +
          '<span>' + escapeHtml(l.trim()) + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
}

function renderNotesBody(args, result) {
  if (args.action === 'create') {
    return '<div class="note-inner">' +
      '<div class="note-title">' + escapeHtml(args.title || 'Untitled') + '</div>' +
      (args.body ? '<div class="note-preview">' + escapeHtml(args.body) + '</div>' : '') +
    '</div>';
  }

  const lines = result.split('\n').filter(function(l) { return l.trim(); });
  if (lines.length > 1) {
    return '<div class="notes-list">' +
      lines.map(function(l) {
        return '<div class="notes-list-item">\uD83D\uDCC4 ' + escapeHtml(l.trim()) + '</div>';
      }).join('') +
    '</div>';
  }

  return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
}

function renderSummarizeBody(args, result) {
  let header = '';
  if (args.url) {
    const domain = getDomain(args.url);
    const isYT = args.url.includes('youtube.com') || args.url.includes('youtu.be');
    header = '<div class="summary-source">' +
      (isYT ? '\u25B6 YouTube \u2022 ' : '') + escapeHtml(domain) +
    '</div>';
  }
  return header + '<div class="tool-result-text summary-text">' + escapeHtml(result) + '</div>';
}

function renderMessagingBody(args, result) {
  if (args.action === 'send') {
    return '<div class="msg-sent">' +
      '<div class="msg-to">To: ' + escapeHtml(args.to || 'Unknown') + '</div>' +
      '<div class="msg-bubble">' + escapeHtml(args.text || '') + '</div>' +
      '<div class="msg-status-sent">\u2713 Sent</div>' +
    '</div>';
  }

  if (args.action === 'read_chat' && result.includes(':')) {
    const lines = result.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length > 1) {
      return '<div class="msg-history">' +
        lines.map(function(l) {
          const m = l.trim().match(/^\s*(You|Them|[^:]+):\s*(.+)/);
          if (m) {
            return '<div class="msg-history-item">' +
              '<span class="msg-sender">' + escapeHtml(m[1]) + '</span>' +
              escapeHtml(m[2]) +
            '</div>';
          }
          return '<div class="msg-history-item">' + escapeHtml(l.trim()) + '</div>';
        }).join('') +
      '</div>';
    }
  }

  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

// ---------------------------------------------------------------------------
// Tool action buttons
// ---------------------------------------------------------------------------
function renderToolActions(name, args) {
  switch (name) {
    case 'music_control':
      return '<button onclick="quickAction(\'play the previous track\')">\u23EE</button>' +
        '<button onclick="quickAction(\'pause the music\')">\u23EF</button>' +
        '<button onclick="quickAction(\'skip to the next track\')">\u23ED</button>' +
        '<button onclick="quickAction(\'what song is currently playing\')">\uD83C\uDFB5 Now</button>';

    case 'smart_home':
      if (args.target && (args.action === 'turn_on' || args.action === 'turn_off')) {
        const opposite = args.action === 'turn_on' ? 'turn off' : 'turn on';
        return '<button onclick="quickAction(\'' + opposite + ' ' + escapeHtml(args.target).replace(/'/g,"\\'") + '\')">' +
          (args.action === 'turn_on' ? 'Turn Off' : 'Turn On') + '</button>';
      }
      return null;

    case 'reminders':
      if (args.action !== 'add') {
        return '<button onclick="quickAction(\'show today\\\'s reminders\')">Today</button>' +
          '<button onclick="quickAction(\'show overdue reminders\')">Overdue</button>';
      }
      return null;

    case 'notes':
      if (args.action !== 'create') {
        return '<button onclick="quickAction(\'list my notes\')">All Notes</button>';
      }
      return null;

    default:
      return null;
  }
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url; }
}

// ---------------------------------------------------------------------------
// Quick Actions
// ---------------------------------------------------------------------------
function quickAction(text) {
  if (!ws || ws.readyState !== 1 || isProcessing) return;
  ws.send(JSON.stringify({ type: 'text_input', text: text }));
  isProcessing = true;
  updateMicState();
}

document.querySelectorAll('.qa-btn[data-cmd]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    quickAction(btn.dataset.cmd);
  });
});

// ---------------------------------------------------------------------------
// Text input
// ---------------------------------------------------------------------------
sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

function sendText() {
  const t = textInput.value.trim();
  if (!t || !ws || ws.readyState !== 1) return;

  if (agentToggle.checked && !agentRunning) {
    addMessage('user', t);
    ws.send(JSON.stringify({ type: 'agent_start', goal: t }));
    textInput.value = '';
    return;
  }

  ws.send(JSON.stringify({ type: 'text_input', text: t, model: modelSelect.value }));
  textInput.value = '';
  isProcessing = true;
  setStatus('Sending...');
  updateMicState();
}

function stopAgent() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'agent_stop' }));
  }
}

// ---------------------------------------------------------------------------
// Model select
// ---------------------------------------------------------------------------
modelSelect.addEventListener('change', function() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_model', model: modelSelect.value }));
  }
});

// ---------------------------------------------------------------------------
// Clear
// ---------------------------------------------------------------------------
clearBtn.addEventListener('click', function() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear' }));
  }
});

// ---------------------------------------------------------------------------
// Audio capture
// ---------------------------------------------------------------------------
async function startListening() {
  if (isListening) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addMessage('error', 'Microphone access denied.');
    return;
  }

  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);

  isListening = true;
  updateMicState();
  setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Click mic to record');
  monitorVolume();
}

function stopListening() {
  isListening = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (micStream) {
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
    analyser = null;
  }

  isRecording = false;
  volumeFill.style.width = '0%';
  updateMicState();
  setStatus('Ready');
}

// ---------------------------------------------------------------------------
// VAD + volume monitoring
// ---------------------------------------------------------------------------
function monitorVolume() {
  if (!isListening || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const rms = Math.sqrt(data.reduce(function(a, v) { return a + v * v; }, 0) / data.length);

  const pct = Math.min(100, (rms / 80) * 100);
  volumeFill.style.width = pct + '%';

  const threshold = parseInt(sensitivitySlider.value);
  thresholdLine.style.left = Math.min(100, (threshold / 80) * 100) + '%';

  if (alwaysOnToggle.checked && !isProcessing) {
    vadLogic(rms, threshold);
  }

  requestAnimationFrame(monitorVolume);
}

function vadLogic(rms, threshold) {
  if (rms > threshold && !isRecording) {
    vadSpeechStart = Date.now();
    startRecording();
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms > threshold && isRecording) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms <= threshold && isRecording && !silenceTimer) {
    silenceTimer = setTimeout(function() {
      const duration = Date.now() - vadSpeechStart;
      if (duration >= MIN_SPEECH_MS) {
        stopRecording();
      } else {
        cancelRecording();
      }
      silenceTimer = null;
    }, SILENCE_MS);
  }
}

// ---------------------------------------------------------------------------
// MediaRecorder
// ---------------------------------------------------------------------------
function startRecording() {
  if (isRecording || !micStream) return;
  isRecording = true;
  updateMicState();

  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4', ''];
  let mimeType = '';
  for (const t of types) {
    if (!t || MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
  }

  const opts = mimeType ? { mimeType: mimeType } : {};
  mediaRecorder = new MediaRecorder(micStream, opts);

  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0 && ws && ws.readyState === 1) {
      ws.send(e.data);
    }
  };

  mediaRecorder.onstop = function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'audio_end' }));
    }
  };

  mediaRecorder.start(250);
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  isProcessing = true;
  updateMicState();

  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cancelRecording() {
  if (!mediaRecorder) return;
  isRecording = false;
  updateMicState();

  mediaRecorder.ondataavailable = null;
  mediaRecorder.onstop = null;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ---------------------------------------------------------------------------
// Mic button
// ---------------------------------------------------------------------------
micBtn.addEventListener('click', async function() {
  if (isProcessing) return;

  if (isRecording) {
    stopRecording();
    return;
  }

  if (alwaysOnToggle.checked) {
    if (isListening) {
      stopListening();
    } else {
      await startListening();
    }
    return;
  }

  if (!isListening) {
    await startListening();
    if (!isListening) return;
  }
  startRecording();
  if (isRecording) {
    setStatus('Recording... click mic to send');
  }
});

// ---------------------------------------------------------------------------
// TTS
// ---------------------------------------------------------------------------
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
let _statusTimer = null;
let _statusStart = 0;

function setStatus(text) {
  // Clear any running elapsed timer
  if (_statusTimer) { clearInterval(_statusTimer); _statusTimer = null; }

  if (text === 'idle') {
    statusText.textContent = isListening ? 'Listening...' : 'Ready';
    return;
  }

  // For active/waiting states, show an elapsed counter
  const isActive = text.endsWith('...') && text !== 'Disconnected. Reconnecting...';
  if (isActive) {
    _statusStart = Date.now();
    statusText.textContent = text;
    _statusTimer = setInterval(() => {
      const elapsed = ((Date.now() - _statusStart) / 1000).toFixed(1);
      statusText.textContent = text.replace('...', '') + ' (' + elapsed + 's)...';
    }, 200);
  } else {
    statusText.textContent = text;
  }
}

function updateMicState() {
  micBtn.classList.remove('listening', 'recording', 'processing');
  if (isProcessing) {
    micBtn.classList.add('processing');
    micBtn.title = 'Processing...';
  } else if (isRecording) {
    micBtn.classList.add('recording');
    micBtn.title = 'Click to send';
  } else if (isListening) {
    micBtn.classList.add('listening');
    micBtn.title = alwaysOnToggle.checked
      ? 'Listening (auto-detect speech)'
      : 'Click to record';
  } else {
    micBtn.title = 'Click to record';
  }
}

// Persist settings
alwaysOnToggle.checked = localStorage.getItem('alwaysOn') === 'true';
sensitivitySlider.value = localStorage.getItem('sensitivity') || '15';
ttsToggle.checked = localStorage.getItem('tts') === 'true';
thinkToggle.checked = localStorage.getItem('autoThink') === 'true';
if (localStorage.getItem('model')) {
  modelSelect.value = localStorage.getItem('model');
}

alwaysOnToggle.addEventListener('change', function() {
  localStorage.setItem('alwaysOn', alwaysOnToggle.checked);
  if (alwaysOnToggle.checked && !isListening) {
    startListening();
  }
  if (isListening) {
    setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Hold mic or spacebar to talk');
  }
  updateMicState();
});
sensitivitySlider.addEventListener('input', function() {
  localStorage.setItem('sensitivity', sensitivitySlider.value);
});
ttsToggle.addEventListener('change', function() {
  localStorage.setItem('tts', ttsToggle.checked);
});
thinkToggle.addEventListener('change', function() {
  localStorage.setItem('autoThink', thinkToggle.checked);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  }
});
modelSelect.addEventListener('change', function() {
  localStorage.setItem('model', modelSelect.value);
});

// Agent mode
agentToggle.checked = localStorage.getItem('agentMode') === 'true';
agentToggle.addEventListener('change', function() {
  localStorage.setItem('agentMode', agentToggle.checked);
  updateAgentUI();
});

function updateAgentUI() {
  if (agentToggle.checked) {
    sendBtn.innerHTML = '<span class="material-symbols-rounded text-[22px]">smart_toy</span> Agent';
    sendBtn.style.background = '#ffb74d';
    sendBtn.style.color = '#1b1b22';
    textInput.placeholder = 'Describe a goal for the agent...';
  } else {
    sendBtn.innerHTML = '<span class="material-symbols-rounded text-[22px]">send</span> Send';
    sendBtn.style.background = '';
    sendBtn.style.color = '';
    textInput.placeholder = 'Type a message...';
  }
}
updateAgentUI();

// ---------------------------------------------------------------------------
// Memory
// ---------------------------------------------------------------------------
function updateMemoryChip(factsCount, sessionsCount, hasWorking) {
  memCountEl.textContent = factsCount;
  if (factsCount > 0) {
    memoryChip.classList.add('has-facts');
    memoryChip.title = factsCount + ' fact' + (factsCount !== 1 ? 's' : '') + ' remembered';
  } else {
    memoryChip.classList.remove('has-facts');
    memoryChip.title = 'Memory (empty)';
  }
}

function toggleMemoryPanel() {
  var isOpen = memoryPanel.classList.toggle('open');
  if (isOpen && ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'get_memory' }));
  }
}

// Close memory panel when clicking outside
document.addEventListener('click', function(e) {
  if (!memoryChip.contains(e.target) && !memoryPanel.contains(e.target)) {
    memoryPanel.classList.remove('open');
  }
});

function renderMemoryPanel(facts, sessions, working) {
  // Facts
  if (facts && facts.length > 0) {
    memFactsEl.innerHTML = facts.map(function(f) {
      return '<div class="memory-fact">\u2022 ' + escapeHtml(f) + '</div>';
    }).join('');
  } else {
    memFactsEl.innerHTML = '<span class="memory-empty">No facts stored yet</span>';
  }

  // Sessions
  if (sessions && sessions.length > 0) {
    memSessionsEl.innerHTML = sessions.map(function(s) {
      return '<div class="memory-session">' +
        '<span class="memory-session-date">' + escapeHtml(s.date || '') + '</span>' +
        escapeHtml(s.summary || '') +
      '</div>';
    }).join('');
  } else {
    memSessionsEl.innerHTML = '<span class="memory-empty">No past sessions</span>';
  }

  // Working
  if (working) {
    memWorkingEl.innerHTML = '<div class="memory-working">' + escapeHtml(working) + '</div>';
  } else {
    memWorkingEl.innerHTML = '<span class="memory-empty">Nothing compacted yet</span>';
  }
}

function clearMemory() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear_memory' }));
    memFactsEl.innerHTML = '<span class="memory-empty">No facts stored yet</span>';
    memSessionsEl.innerHTML = '<span class="memory-empty">No past sessions</span>';
    memWorkingEl.innerHTML = '<span class="memory-empty">Nothing compacted yet</span>';
    memoryPanel.classList.remove('open');
    addMessage('system', 'Memory cleared');
  }
}

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
connectWS();
