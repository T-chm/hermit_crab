<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermit Crab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f0f1a;
  --surface:   #1a1a2e;
  --surface2:  #252540;
  --user-bg:   #0f3460;
  --assist-bg: #1e1e3a;
  --accent:    #e94560;
  --accent2:   #4ecdc4;
  --text:      #e8e8e8;
  --text-dim:  #8888aa;
  --radius:    12px;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px; overflow: hidden;
}

#app {
  display: flex; flex-direction: column; height: 100dvh;
  max-width: 800px; margin: 0 auto;
}

/* --- Header --- */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--surface2);
  flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
#connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); transition: background 0.3s;
}
#connection-dot.connected { background: var(--accent2); }

#status-text {
  font-size: 12px; color: var(--text-dim); margin-left: 8px;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.header-right { display: flex; align-items: center; gap: 8px; }

#model-select {
  background: var(--surface2); color: var(--text); border: 1px solid #333;
  border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
}

/* --- Chat --- */
#chat {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}

.msg {
  max-width: 85%; padding: 10px 14px; border-radius: var(--radius);
  line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}
.msg.user {
  align-self: flex-end; background: var(--user-bg);
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start; background: var(--assist-bg);
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center; color: var(--text-dim); font-size: 13px;
  background: none; padding: 4px 0;
}
.msg.error {
  align-self: center; color: var(--accent); font-size: 13px;
  background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3);
}
.msg.thinking {
  align-self: flex-start; color: var(--text-dim); font-size: 13px;
  background: rgba(78,205,196,0.05); border: 1px solid rgba(78,205,196,0.15);
  font-style: italic; max-height: 80px; overflow-y: auto;
}
.thinking-label {
  color: var(--accent2); font-weight: 600; font-style: normal;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px; display: block;
}
@keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
.thinking-dots::after { content: '...'; animation: dots 1.5s infinite steps(1); }

.msg code {
  background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
}
.msg pre {
  background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;
  overflow-x: auto; margin: 6px 0;
}
.msg pre code { background: none; padding: 0; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* --- Footer --- */
footer {
  flex-shrink: 0; padding: 12px 20px 16px;
  border-top: 1px solid var(--surface2); background: var(--surface);
}

/* Volume meter */
#volume-container {
  height: 4px; background: var(--bg); border-radius: 2px;
  margin-bottom: 10px; overflow: hidden; position: relative;
}
#volume-fill {
  height: 100%; width: 0%; border-radius: 2px;
  background: var(--accent2); transition: width 0.05s;
}
#threshold-line {
  position: absolute; top: 0; height: 100%; width: 2px;
  background: var(--accent); left: 15%;
}

/* Input row */
#input-row {
  display: flex; gap: 8px; align-items: center;
}
#text-input {
  flex: 1; background: var(--bg); color: var(--text);
  border: 1px solid var(--surface2); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
#text-input:focus { border-color: var(--accent2); }

#send-btn {
  background: var(--accent2); color: var(--bg); border: none;
  border-radius: 8px; padding: 10px 16px; font-weight: 600;
  cursor: pointer; font-size: 14px; white-space: nowrap;
}
#send-btn:hover { filter: brightness(1.1); }

/* Mic button */
#mic-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--text-dim); background: transparent;
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
#mic-btn:hover { border-color: var(--text); }
#mic-btn.listening {
  border-color: var(--accent2); color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(78,205,196,0.2);
}
#mic-btn.recording {
  border-color: var(--accent); color: var(--accent);
  animation: pulse 1s infinite;
}
#mic-btn.processing {
  border-color: #f0a500; color: #f0a500;
  pointer-events: none; opacity: 0.7;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(233,69,96,0.2); }
  50%      { box-shadow: 0 0 0 8px rgba(233,69,96,0.1); }
}

/* Controls row */
#controls-row {
  display: flex; align-items: center; gap: 12px;
  margin-top: 8px; font-size: 12px; color: var(--text-dim);
}

.toggle-label {
  display: flex; align-items: center; gap: 4px; cursor: pointer;
  user-select: none;
}
.toggle-label input { accent-color: var(--accent2); }

#sensitivity-slider {
  width: 80px; accent-color: var(--accent2);
}

#clear-btn {
  margin-left: auto; background: none; border: 1px solid var(--surface2);
  color: var(--text-dim); border-radius: 6px; padding: 3px 10px;
  cursor: pointer; font-size: 12px;
}
#clear-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Scrollbar */
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <h1><span>&#129408;</span> Hermit Crab</h1>
      <div id="connection-dot" title="Disconnected"></div>
      <span id="status-text">Connecting...</span>
    </div>
    <div class="header-right">
      <select id="model-select">
        <option value="qwen3.5:4b" selected>qwen3.5:4b</option>
        <option value="qwen2.5:7b">qwen2.5:7b</option>
        <option value="qwen2.5:3b">qwen2.5:3b</option>
        <option value="qwen3:4b">qwen3:4b</option>
        <option value="llama3.2">llama3.2</option>
      </select>
    </div>
  </header>

  <div id="chat">
    <div class="msg system">Welcome. Click the mic or type below to start.</div>
  </div>

  <footer>
    <div id="volume-container">
      <div id="volume-fill"></div>
      <div id="threshold-line"></div>
    </div>
    <div id="input-row">
      <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn">Send</button>
      <button id="mic-btn" title="Click to start listening">&#127908;</button>
    </div>
    <div id="controls-row">
      <label class="toggle-label">
        <input type="checkbox" id="always-on-toggle"> Always listen
      </label>
      <label class="toggle-label">
        Sensitivity
        <input type="range" id="sensitivity-slider" min="3" max="60" value="15">
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="think-toggle"> Auto think
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="tts-toggle"> Speak replies
      </label>
      <button id="clear-btn">Clear chat</button>
    </div>
  </footer>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ws = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let mediaRecorder = null;

let isListening = false;   // mic stream active
let isRecording = false;    // MediaRecorder capturing
let isProcessing = false;   // waiting for server response

let vadSpeechStart = 0;
let silenceTimer = null;

const MIN_SPEECH_MS = 300;
const SILENCE_MS = 1500;

// DOM
const chat = document.getElementById('chat');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const alwaysOnToggle = document.getElementById('always-on-toggle');
const sensitivitySlider = document.getElementById('sensitivity-slider');
const ttsToggle = document.getElementById('tts-toggle');
const thinkToggle = document.getElementById('think-toggle');
const clearBtn = document.getElementById('clear-btn');
const statusText = document.getElementById('status-text');
const connDot = document.getElementById('connection-dot');
const volumeFill = document.getElementById('volume-fill');
const thresholdLine = document.getElementById('threshold-line');
const modelSelect = document.getElementById('model-select');

let currentAssistantEl = null;
let currentThinkingEl = null;

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connDot.classList.add('connected');
    connDot.title = 'Connected';
    setStatus('Ready');
    // Send initial settings
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  };

  ws.onclose = () => {
    connDot.classList.remove('connected');
    connDot.title = 'Disconnected';
    setStatus('Disconnected. Reconnecting...');
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {};

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleServerMsg(data);
  };
}

function handleServerMsg(data) {
  switch (data.type) {
    case 'transcription':
      addMessage('user', data.text);
      setStatus('Processing...');
      break;

    case 'llm_start':
      break;

    case 'thinking_start':
      currentThinkingEl = addMessage('thinking', '');
      currentThinkingEl.innerHTML = '<span class="thinking-label">Deep thinking<span class="thinking-dots"></span></span>';
      setStatus('Deep thinking...');
      break;

    case 'thinking_token':
      if (currentThinkingEl) {
        // Keep the label, append thinking text
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) {
          // First token — add text node after label
          const textNode = document.createTextNode(data.token);
          currentThinkingEl.appendChild(textNode);
        } else {
          currentThinkingEl.appendChild(document.createTextNode(data.token));
        }
        currentThinkingEl.scrollTop = currentThinkingEl.scrollHeight;
        scrollToBottom();
      }
      break;

    case 'thinking_done':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) label.innerHTML = 'Thought';
        currentThinkingEl.style.maxHeight = '40px';
        currentThinkingEl = null;
      }
      // Now create the assistant bubble for the actual response
      currentAssistantEl = addMessage('assistant', '');
      setStatus('Responding...');
      break;

    case 'llm_token':
      if (!currentAssistantEl) {
        // No thinking phase — model responded directly
        currentAssistantEl = addMessage('assistant', '');
      }
      currentAssistantEl.textContent += data.token;
      scrollToBottom();
      break;

    case 'llm_done':
      if (currentAssistantEl) {
        renderMarkdown(currentAssistantEl, data.text);
      }
      currentAssistantEl = null;
      currentThinkingEl = null;
      isProcessing = false;
      // Release mic in manual mode after response is done
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      if (ttsToggle.checked && data.text) {
        speak(data.text);
      }
      break;

    case 'think_decision':
      if (data.enabled) {
        addMessage('system', 'Deep thinking enabled for this query');
      }
      break;

    case 'tool_call':
      const action = data.args?.action || data.name;
      const query = data.args?.query ? `: ${data.args.query}` : '';
      const app = data.args?.app === 'spotify' ? ' (Spotify)' : ' (Apple Music)';
      addMessage('system', `${action}${query}${app}`);
      break;

    case 'status':
      setStatus(data.text);
      break;

    case 'error':
      addMessage('error', data.text);
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      break;

    case 'cleared':
      chat.innerHTML = '<div class="msg system">Conversation cleared.</div>';
      break;

    case 'model_set':
      addMessage('system', `Model set to ${data.model}`);
      break;
  }
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = `msg ${role}`;
  if (role === 'assistant' && text) {
    renderMarkdown(el, text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

function renderMarkdown(el, text) {
  // Simple markdown: code blocks and inline code
  let html = escapeHtml(text);
  // Code blocks
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------------
// Text input
// ---------------------------------------------------------------------------
sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

function sendText() {
  const t = textInput.value.trim();
  if (!t || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'text_input', text: t, model: modelSelect.value }));
  textInput.value = '';
  isProcessing = true;
  updateMicState();
}

// ---------------------------------------------------------------------------
// Model select
// ---------------------------------------------------------------------------
modelSelect.addEventListener('change', () => {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_model', model: modelSelect.value }));
  }
});

// ---------------------------------------------------------------------------
// Clear
// ---------------------------------------------------------------------------
clearBtn.addEventListener('click', () => {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear' }));
  }
});

// ---------------------------------------------------------------------------
// Audio capture
// ---------------------------------------------------------------------------
async function startListening() {
  if (isListening) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addMessage('error', 'Microphone access denied.');
    return;
  }

  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);

  isListening = true;
  updateMicState();
  setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Click mic to record');
  monitorVolume();
}

function stopListening() {
  isListening = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (micStream) {
    micStream.getTracks().forEach(t => t.stop());
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
    analyser = null;
  }

  isRecording = false;
  volumeFill.style.width = '0%';
  updateMicState();
  setStatus('Ready');
}

// ---------------------------------------------------------------------------
// VAD + volume monitoring
// ---------------------------------------------------------------------------
function monitorVolume() {
  if (!isListening || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const rms = Math.sqrt(data.reduce((a, v) => a + v * v, 0) / data.length);

  const pct = Math.min(100, (rms / 80) * 100);
  volumeFill.style.width = pct + '%';

  const threshold = parseInt(sensitivitySlider.value);
  thresholdLine.style.left = Math.min(100, (threshold / 80) * 100) + '%';

  // VAD logic only in always-on mode
  if (alwaysOnToggle.checked && !isProcessing) {
    vadLogic(rms, threshold);
  }

  requestAnimationFrame(monitorVolume);
}

function vadLogic(rms, threshold) {
  if (rms > threshold && !isRecording) {
    vadSpeechStart = Date.now();
    startRecording();
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms > threshold && isRecording) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms <= threshold && isRecording && !silenceTimer) {
    silenceTimer = setTimeout(() => {
      const duration = Date.now() - vadSpeechStart;
      if (duration >= MIN_SPEECH_MS) {
        stopRecording();
      } else {
        cancelRecording();
      }
      silenceTimer = null;
    }, SILENCE_MS);
  }
}

// ---------------------------------------------------------------------------
// MediaRecorder
// ---------------------------------------------------------------------------
function startRecording() {
  if (isRecording || !micStream) return;
  isRecording = true;
  updateMicState();

  // Detect supported MIME type
  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4', ''];
  let mimeType = '';
  for (const t of types) {
    if (!t || MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
  }

  const opts = mimeType ? { mimeType } : {};
  mediaRecorder = new MediaRecorder(micStream, opts);

  mediaRecorder.ondataavailable = (e) => {
    if (e.data.size > 0 && ws && ws.readyState === 1) {
      ws.send(e.data);
    }
  };

  mediaRecorder.onstop = () => {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'audio_end' }));
    }
  };

  mediaRecorder.start(250);
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  isProcessing = true;
  updateMicState();

  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cancelRecording() {
  if (!mediaRecorder) return;
  isRecording = false;
  updateMicState();

  mediaRecorder.ondataavailable = null;
  mediaRecorder.onstop = null;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ---------------------------------------------------------------------------
// Mic button — click to start recording, click again to send
// ---------------------------------------------------------------------------
micBtn.addEventListener('click', async () => {
  if (isProcessing) return;

  // Currently recording → stop and send (works in both modes)
  if (isRecording) {
    stopRecording();
    return;
  }

  // Always-on mode: mic button toggles listening on/off (VAD handles recording)
  if (alwaysOnToggle.checked) {
    if (isListening) {
      stopListening();
    } else {
      await startListening();
    }
    return;
  }

  // Manual mode: start mic if needed, then start recording
  if (!isListening) {
    await startListening();
    if (!isListening) return;
  }
  startRecording();
  if (isRecording) {
    setStatus('Recording... click mic to send');
  }
});

// ---------------------------------------------------------------------------
// TTS
// ---------------------------------------------------------------------------
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setStatus(text) {
  if (text === 'idle') text = isListening ? 'Listening...' : 'Ready';
  statusText.textContent = text;
}

function updateMicState() {
  micBtn.classList.remove('listening', 'recording', 'processing');
  if (isProcessing) {
    micBtn.classList.add('processing');
    micBtn.title = 'Processing...';
  } else if (isRecording) {
    micBtn.classList.add('recording');
    micBtn.title = 'Click to send';
  } else if (isListening) {
    micBtn.classList.add('listening');
    micBtn.title = alwaysOnToggle.checked
      ? 'Listening (auto-detect speech)'
      : 'Click to record';
  } else {
    micBtn.title = 'Click to record';
  }
}

// Persist settings
alwaysOnToggle.checked = localStorage.getItem('alwaysOn') === 'true';
sensitivitySlider.value = localStorage.getItem('sensitivity') || '15';
ttsToggle.checked = localStorage.getItem('tts') === 'true';
thinkToggle.checked = localStorage.getItem('autoThink') === 'true';
if (localStorage.getItem('model')) {
  modelSelect.value = localStorage.getItem('model');
}

alwaysOnToggle.addEventListener('change', () => {
  localStorage.setItem('alwaysOn', alwaysOnToggle.checked);
  if (alwaysOnToggle.checked && !isListening) {
    startListening();
  }
  if (isListening) {
    setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Hold mic or spacebar to talk');
  }
  updateMicState();
});
sensitivitySlider.addEventListener('input', () => {
  localStorage.setItem('sensitivity', sensitivitySlider.value);
});
ttsToggle.addEventListener('change', () => {
  localStorage.setItem('tts', ttsToggle.checked);
});
thinkToggle.addEventListener('change', () => {
  localStorage.setItem('autoThink', thinkToggle.checked);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  }
});
modelSelect.addEventListener('change', () => {
  localStorage.setItem('model', modelSelect.value);
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
connectWS();
</script>
</body>
</html>
