<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermit Crab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        sans: ['Roboto', 'system-ui', 'sans-serif'],
      },
      colors: {
        md: {
          primary:                '#c586f7',
          'on-primary':           '#1a0a2e',
          'primary-ctr':          '#2d1b4e',
          'on-primary-ctr':       '#e0c0ff',
          secondary:              '#f472b6',
          'secondary-ctr':        '#6b2c47',
          error:                  '#ffb4ab',
          'error-ctr':            '#93000a',
          surface:                '#0a0a1a',
          'surface-ctr-low':      '#0f0f24',
          'surface-ctr':          '#141428',
          'surface-ctr-high':     '#1c1c36',
          'surface-ctr-highest':  '#252545',
          'on-surface':           '#e8e4f0',
          'on-surface-var':       '#a8a4b4',
          outline:                '#6e6a7a',
          'outline-var':          '#2e2b4a',
        }
      },
      boxShadow: {
        'md-1': '0 1px 3px rgba(0,0,0,0.5), 0 0 8px rgba(140,80,220,0.08)',
        'md-2': '0 3px 8px rgba(0,0,0,0.4), 0 0 12px rgba(140,80,220,0.1)',
        'md-3': '0 6px 16px rgba(0,0,0,0.35), 0 0 20px rgba(140,80,220,0.12)',
      }
    }
  }
}
</script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --md-primary:               #c586f7;
  --md-on-primary:            #1a0a2e;
  --md-primary-ctr:           #2d1b4e;
  --md-on-primary-ctr:        #e0c0ff;
  --md-secondary:             #f472b6;
  --md-secondary-ctr:         #6b2c47;
  --md-error:                 #ffb4ab;
  --md-surface:               #0a0a1a;
  --md-surface-ctr-low:       #0f0f24;
  --md-surface-ctr:           #141428;
  --md-surface-ctr-high:      #1c1c36;
  --md-surface-ctr-highest:   #252545;
  --md-on-surface:            #e8e4f0;
  --md-on-surface-var:        #a8a4b4;
  --md-outline:               #6e6a7a;
  --md-outline-var:           #2e2b4a;
  --md-glow:                  rgba(160,100,240,0.15);
  --md-glow-border:           rgba(160,100,240,0.3);
  --md-gradient:              linear-gradient(135deg, #e040a0, #8040e0);
}

html, body { height: 100%; }
.material-symbols-rounded { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }

/* ---- Animations ---- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 4px rgba(244,114,182,0.25); }
  50%      { box-shadow: 0 0 0 14px rgba(244,114,182,0.05); }
}
@keyframes glowPulse {
  0%, 100% { border-color: var(--md-glow-border); box-shadow: 0 0 12px var(--md-glow); }
  50%      { border-color: rgba(160,100,240,0.5); box-shadow: 0 0 20px rgba(160,100,240,0.25); }
}
@keyframes dots {
  0%,20%  { content: '.'; }
  40%     { content: '..'; }
  60%,100%{ content: '...'; }
}

/* ---- Scrollbar ---- */
#chat::-webkit-scrollbar { width: 8px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: rgba(160,100,240,0.2); border-radius: 4px; }
#chat::-webkit-scrollbar-thumb:hover { background: rgba(160,100,240,0.4); }
#quick-actions::-webkit-scrollbar { display: none; }

/* ================================================================
   Dynamic element styles (created by JavaScript)
   ================================================================ */

/* ---- Messages ---- */
.msg {
  max-width: 78%; padding: 10px 16px; border-radius: 14px;
  line-height: 1.55; white-space: pre-wrap; word-wrap: break-word;
  animation: fadeIn 0.25s ease; font-size: 0.875rem;
}
.msg.user {
  align-self: flex-end; background: var(--md-primary-ctr); color: var(--md-on-primary-ctr);
  border-bottom-right-radius: 4px;
  border: 1px solid rgba(160,100,240,0.2);
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 8px rgba(160,100,240,0.08);
}
.msg.assistant {
  align-self: flex-start; background: var(--md-surface-ctr-high); color: var(--md-on-surface);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--md-outline-var);
  box-shadow: 0 1px 4px rgba(0,0,0,0.3);
}
.msg.system {
  align-self: center; color: var(--md-on-surface-var); font-size: 0.813rem;
  background: none; padding: 6px 0;
}
.msg.error {
  align-self: center; color: var(--md-error); font-size: 0.813rem;
  background: rgba(255,180,171,0.08); border: 1px solid rgba(255,180,171,0.2);
  border-radius: 10px;
}
.msg.thinking {
  align-self: flex-start; color: var(--md-on-surface-var); font-size: 0.813rem;
  background: rgba(160,100,240,0.04); border: 1px solid rgba(160,100,240,0.15);
  font-style: italic; max-height: 80px; overflow-y: auto; border-radius: 10px;
}
.thinking-label {
  color: var(--md-primary); font-weight: 500; font-style: normal;
  font-size: 0.688rem; text-transform: uppercase; letter-spacing: 0.8px;
  margin-bottom: 4px; display: block;
}
.thinking-dots::after { content: '...'; animation: dots 1.5s infinite steps(1); }

.msg code {
  background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 4px;
  font-family: 'Roboto Mono', 'SF Mono', monospace; font-size: 0.813rem;
}
.msg pre {
  background: rgba(0,0,0,0.4); padding: 12px; border-radius: 10px;
  overflow-x: auto; margin: 8px 0;
}
.msg pre code { background: none; padding: 0; }

/* ---- Tool Cards ---- */
.tool-card {
  align-self: flex-start; width: 92%; max-width: 480px;
  background: var(--md-surface-ctr); color: var(--md-on-surface);
  border-radius: 12px; border: 1px solid var(--md-glow-border);
  border-left: 3px solid var(--md-primary);
  padding: 14px 18px; animation: fadeIn 0.25s ease; font-size: 0.875rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 12px var(--md-glow);
}
.tool-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.tool-icon { font-size: 1.125rem; line-height: 1; }
.tool-label {
  font-weight: 500; font-size: 0.688rem; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--md-primary);
}
.tool-detail { color: var(--md-on-surface-var); font-size: 0.813rem; margin-left: auto; }
.tool-body { color: var(--md-on-surface); line-height: 1.55; }
.tool-result-text {
  white-space: pre-wrap; word-wrap: break-word; font-size: 0.813rem;
  max-height: 260px; overflow-y: auto; margin: 0;
  background: none; border: none; padding: 0; color: var(--md-on-surface);
  font-family: inherit;
}
.tool-actions {
  display: flex; gap: 8px; margin-top: 12px; padding-top: 12px;
  border-top: 1px solid var(--md-outline-var); flex-wrap: wrap;
}
.tool-actions button {
  background: var(--md-surface-ctr-high); border: 1px solid var(--md-outline-var);
  color: var(--md-on-surface); padding: 6px 14px; border-radius: 16px;
  cursor: pointer; font-size: 0.813rem; transition: all 0.2s; font-family: inherit;
  font-weight: 500;
}
.tool-actions button:hover {
  background: var(--md-primary); color: var(--md-on-primary);
  border-color: var(--md-primary); box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* Loading */
.tool-card.loading .tool-body { color: var(--md-on-surface-var); font-style: italic; }
.tool-card.loading .tool-body::after { content: '...'; animation: dots 1.5s infinite steps(1); }

/* Error */
.tool-card.tool-error { border-left-color: var(--md-error); }
.tool-card.tool-error .tool-label { color: var(--md-error); }

/* Tool accent colors */
.tool-card.tool-weather { border-left-color: #64b5f6; }
.tool-card.tool-weather .tool-label { color: #64b5f6; }
.tool-card.tool-music_control { border-left-color: #f48fb1; }
.tool-card.tool-music_control .tool-label { color: #f48fb1; }
.tool-card.tool-smart_home { border-left-color: #ffd54f; }
.tool-card.tool-smart_home .tool-label { color: #ffd54f; }
.tool-card.tool-reminders { border-left-color: #81c784; }
.tool-card.tool-reminders .tool-label { color: #81c784; }
.tool-card.tool-notes { border-left-color: #ce93d8; }
.tool-card.tool-notes .tool-label { color: #ce93d8; }
.tool-card.tool-summarize { border-left-color: #b39ddb; }
.tool-card.tool-summarize .tool-label { color: #b39ddb; }
.tool-card.tool-messaging { border-left-color: #4dd0e1; }
.tool-card.tool-messaging .tool-label { color: #4dd0e1; }
.tool-card.tool-stocks { border-left-color: #4caf50; }
.tool-card.tool-stocks .tool-label { color: #4caf50; }
.tool-card.tool-gmail { border-left-color: #ea4335; }
.tool-card.tool-gmail .tool-label { color: #ea4335; }
.tool-card.tool-calendar { border-left-color: #4285f4; }
.tool-card.tool-calendar .tool-label { color: #4285f4; }

/* ---- Stocks ---- */
.stock-quote { display: flex; flex-direction: column; gap: 10px; }
.stock-header { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
.stock-symbol { font-weight: 700; font-size: 1rem; color: var(--md-on-surface); letter-spacing: 0.5px; }
.stock-name { font-size: 0.75rem; color: var(--md-on-surface-var); }
.stock-price-row { display: flex; align-items: baseline; gap: 8px; }
.stock-price { font-size: 1.5rem; font-weight: 700; color: var(--md-on-surface); letter-spacing: -0.5px; }
.stock-change { font-size: 0.813rem; font-weight: 600; padding: 2px 8px; border-radius: 6px; }
.stock-change.up { color: #4caf50; background: rgba(76,175,80,0.12); }
.stock-change.down { color: #ef5350; background: rgba(239,83,80,0.12); }
.stock-change.flat { color: var(--md-on-surface-var); background: rgba(168,164,180,0.1); }
.stock-spark { display: flex; align-items: flex-end; gap: 1px; height: 28px; margin-top: 2px; }
.stock-spark-bar {
  flex: 1; min-width: 6px; border-radius: 2px 2px 0 0;
  transition: height 0.3s;
}
.stock-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; }
.stock-stat { display: flex; justify-content: space-between; font-size: 0.688rem; padding: 2px 0; }
.stock-stat-label { color: var(--md-on-surface-var); }
.stock-stat-value { color: var(--md-on-surface); font-weight: 500; }
.stock-range { margin-top: 4px; }
.stock-range-label { font-size: 0.625rem; color: var(--md-on-surface-var); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 3px; }
.stock-range-bar { height: 4px; background: var(--md-surface-ctr-highest); border-radius: 2px; position: relative; overflow: visible; }
.stock-range-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #ef5350, #ffeb3b, #4caf50); }
.stock-range-marker {
  position: absolute; top: -3px; width: 10px; height: 10px;
  background: var(--md-on-surface); border: 2px solid var(--md-surface-ctr);
  border-radius: 50%; transform: translateX(-50%);
}
.stock-range-ends { display: flex; justify-content: space-between; font-size: 0.625rem; color: var(--md-on-surface-var); margin-top: 2px; }
.stock-sector { font-size: 0.625rem; color: var(--md-on-surface-var); padding: 2px 8px; background: var(--md-surface-ctr-high); border-radius: 8px; display: inline-block; }

/* Watchlist / Market */
.stock-list { display: flex; flex-direction: column; gap: 6px; }
.stock-list-item {
  display: flex; align-items: center; gap: 10px; padding: 6px 10px;
  background: var(--md-surface-ctr-high); border-radius: 8px;
  border: 1px solid var(--md-outline-var);
}
.stock-list-sym { font-weight: 700; font-size: 0.813rem; min-width: 55px; color: var(--md-on-surface); }
.stock-list-name { flex: 1; font-size: 0.688rem; color: var(--md-on-surface-var); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stock-list-price { font-size: 0.813rem; font-weight: 600; color: var(--md-on-surface); text-align: right; min-width: 60px; }
.stock-list-change { font-size: 0.688rem; font-weight: 600; text-align: right; min-width: 65px; }

/* ---- Gmail ---- */
.email-list { display: flex; flex-direction: column; gap: 6px; }
.email-item {
  padding: 8px 10px; background: var(--md-surface-ctr-high); border-radius: 8px;
  border: 1px solid var(--md-outline-var); cursor: default;
}
.email-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.email-from { font-weight: 600; font-size: 0.75rem; color: var(--md-on-surface); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.email-date { font-size: 0.625rem; color: var(--md-on-surface-var); white-space: nowrap; }
.email-subject { font-size: 0.813rem; color: var(--md-on-surface); font-weight: 500; margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.email-snippet { font-size: 0.688rem; color: var(--md-on-surface-var); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.email-unread-badge { font-size: 0.563rem; font-weight: 700; background: #ea4335; color: white; padding: 1px 6px; border-radius: 8px; }
.email-body { font-size: 0.75rem; color: var(--md-on-surface); line-height: 1.55; white-space: pre-wrap; word-wrap: break-word; max-height: 200px; overflow-y: auto; }
.email-sent-confirm { display: flex; flex-direction: column; gap: 4px; }
.email-sent-to { font-size: 0.688rem; color: var(--md-on-surface-var); }
.email-sent-subject { font-size: 0.875rem; font-weight: 500; color: var(--md-on-surface); }
.email-sent-status { font-size: 0.688rem; color: #4caf50; font-weight: 600; }

/* ---- Calendar ---- */
.cal-events { display: flex; flex-direction: column; gap: 6px; }
.cal-date-label { font-size: 0.625rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: #4285f4; padding: 4px 0 2px; }
.cal-event {
  display: flex; gap: 10px; padding: 8px 10px; background: var(--md-surface-ctr-high);
  border-radius: 8px; border: 1px solid var(--md-outline-var); border-left: 3px solid #4285f4;
}
.cal-time { display: flex; flex-direction: column; align-items: center; min-width: 50px; flex-shrink: 0; }
.cal-time-start { font-size: 0.75rem; font-weight: 600; color: var(--md-on-surface); }
.cal-time-end { font-size: 0.625rem; color: var(--md-on-surface-var); }
.cal-time-allday { font-size: 0.625rem; font-weight: 600; color: #4285f4; text-transform: uppercase; }
.cal-details { flex: 1; min-width: 0; }
.cal-title { font-size: 0.813rem; font-weight: 600; color: var(--md-on-surface); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-location { font-size: 0.625rem; color: var(--md-on-surface-var); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cal-attendees { font-size: 0.625rem; color: var(--md-on-surface-var); margin-top: 2px; }
.cal-hangout { font-size: 0.625rem; color: #4285f4; text-decoration: none; }
.cal-hangout:hover { text-decoration: underline; }
.cal-empty { font-size: 0.75rem; color: var(--md-on-surface-var); font-style: italic; padding: 8px 0; }
.cal-created { display: flex; flex-direction: column; gap: 4px; }
.cal-created-title { font-size: 0.875rem; font-weight: 600; color: var(--md-on-surface); }
.cal-created-time { font-size: 0.75rem; color: var(--md-on-surface-var); }
.cal-created-status { font-size: 0.688rem; color: #4caf50; font-weight: 600; }

/* ---- Trips ---- */
.trip-list { display: flex; flex-direction: column; gap: 6px; }
.trip-item {
  display: flex; gap: 10px; padding: 8px 10px; background: var(--md-surface-ctr-high);
  border-radius: 8px; border: 1px solid var(--md-outline-var); border-left: 3px solid #26c6da;
}
.trip-next { background: rgba(38,198,218,0.06); border-color: rgba(38,198,218,0.3); }
.trip-type-badge {
  font-size: 0.563rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
  padding: 1px 6px; border-radius: 6px; white-space: nowrap; line-height: 1.6;
}
.trip-type-flight { background: rgba(38,198,218,0.15); color: #26c6da; }
.trip-type-hotel { background: rgba(255,183,77,0.15); color: #ffb74d; }
.trip-type-airbnb { background: rgba(255,87,95,0.15); color: #ff575f; }
.trip-type-car_rental { background: rgba(129,199,132,0.15); color: #81c784; }
.trip-type-train { background: rgba(179,157,219,0.15); color: #b39ddb; }
.trip-type-travel { background: rgba(38,198,218,0.15); color: #26c6da; }
.trip-type-event { background: rgba(244,143,177,0.15); color: #f48fb1; }
.trip-icon { font-size: 1.1rem; line-height: 1; flex-shrink: 0; padding-top: 2px; }
.trip-details { flex: 1; min-width: 0; }
.trip-subject { font-size: 0.75rem; font-weight: 600; color: var(--md-on-surface); margin-bottom: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.trip-dates { font-size: 0.625rem; color: var(--md-on-surface-var); margin-bottom: 2px; }
.trip-locations { font-size: 0.625rem; color: #26c6da; font-weight: 500; }
.trip-cal-status { font-size: 0.563rem; font-weight: 600; margin-top: 3px; }
.trip-cal-yes { color: #4caf50; }
.trip-cal-no { color: #ff9800; }
.trip-summary { display: flex; gap: 12px; margin-bottom: 8px; font-size: 0.688rem; color: var(--md-on-surface-var); }
.trip-summary-stat { display: flex; align-items: center; gap: 4px; }
.trip-summary-num { font-weight: 700; color: var(--md-on-surface); }
.trip-created-list { display: flex; flex-direction: column; gap: 4px; }
.trip-created-item { font-size: 0.75rem; color: var(--md-on-surface); padding: 6px 8px; background: var(--md-surface-ctr-high); border-radius: 6px; border-left: 3px solid #4caf50; }
.trip-created-status { font-size: 0.688rem; color: #4caf50; font-weight: 600; }

/* ---- Daily Brief ---- */
.tool-card.tool-daily_brief { border-left-color: #ffc107; }
.tool-card.tool-daily_brief .tool-label { color: #ffc107; }
.brief { display: flex; flex-direction: column; gap: 10px; }
.brief-header { display: flex; flex-direction: column; gap: 2px; }
.brief-greeting { font-size: 1.1rem; font-weight: 700; color: var(--md-on-surface); }
.brief-date { font-size: 0.688rem; color: var(--md-on-surface-var); }
.brief-sections { display: flex; flex-direction: column; gap: 8px; }
.brief-section {
  padding: 8px 10px; background: var(--md-surface-ctr-high); border-radius: 8px;
  border: 1px solid var(--md-outline-var);
}
.brief-section-head {
  display: flex; align-items: center; gap: 6px; margin-bottom: 6px;
  font-size: 0.625rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px;
}
.brief-section-icon { font-size: 0.875rem; line-height: 1; }
.brief-section-label { color: var(--md-on-surface-var); }
.brief-weather { display: flex; align-items: center; gap: 10px; }
.brief-weather-icon { font-size: 1.6rem; line-height: 1; flex-shrink: 0; }
.brief-weather-main { display: flex; flex-direction: column; gap: 1px; }
.brief-weather-temp { font-size: 1.1rem; font-weight: 700; color: var(--md-on-surface); }
.brief-weather-feels { font-size: 0.625rem; color: var(--md-on-surface-var); }
.brief-weather-details { display: flex; gap: 10px; font-size: 0.625rem; color: var(--md-on-surface-var); margin-left: auto; }
.brief-weather-detail { display: flex; align-items: center; gap: 3px; }
.brief-weather-text { font-size: 0.75rem; color: var(--md-on-surface); line-height: 1.4; }
.brief-stock-row {
  display: flex; align-items: center; gap: 8px; padding: 3px 0;
  font-size: 0.688rem; border-bottom: 1px solid var(--md-outline-var);
}
.brief-stock-row:last-child { border-bottom: none; }
.brief-stock-sym { font-weight: 700; min-width: 50px; color: var(--md-on-surface); }
.brief-stock-name { flex: 1; color: var(--md-on-surface-var); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.brief-stock-price { min-width: 55px; text-align: right; font-weight: 600; color: var(--md-on-surface); }
.brief-stock-chg { min-width: 60px; text-align: right; font-weight: 600; font-size: 0.625rem; }
.brief-stock-chg.up { color: #4caf50; }
.brief-stock-chg.down { color: #ef5350; }
.brief-stock-chg.flat { color: var(--md-on-surface-var); }
.brief-email-row {
  display: flex; gap: 8px; padding: 4px 0;
  border-bottom: 1px solid var(--md-outline-var); font-size: 0.688rem;
}
.brief-email-row:last-child { border-bottom: none; }

@keyframes agentPulse {

}

.agent-badge.error { background: var(--md-error); }

        Sensitivity
        <input type="range" id="sensitivity-slider" min="3" max="60" value="15" class="w-20 accent-[#c586f7]">
      </label>
      <label class="flex items-center gap-1.5 cursor-pointer select-none hover:text-md-on-surface transition-colors">
        <input type="checkbox" id="think-toggle" class="w-3.5 h-3.5 accent-[#c586f7]"> Auto think
      </label>
      <label class="flex items-center gap-1.5 cursor-pointer select-none hover:text-md-on-surface transition-colors">
        <input type="checkbox" id="agent-toggle" class="w-3.5 h-3.5 accent-[#c586f7]"> <span>Agent mode</span>
      </label>
      <label class="flex items-center gap-1.5 cursor-pointer select-none hover:text-md-on-surface transition-colors">
        <input type="checkbox" id="tts-toggle" class="w-3.5 h-3.5 accent-[#c586f7]"> Speak replies
      </label>
      <button id="clear-btn" class="ml-auto bg-transparent border border-md-outline-var text-md-on-surface-var rounded-lg px-3 py-1 cursor-pointer text-xs transition-all duration-200 hover:border-md-error hover:text-md-error hover:bg-md-error/5 font-medium">
        Clear chat
      </button>
    </div>
  </footer>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ws = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let mediaRecorder = null;

let isListening = false;
let isRecording = false;
let isProcessing = false;

let vadSpeechStart = 0;
let silenceTimer = null;

const MIN_SPEECH_MS = 300;
const SILENCE_MS = 1500;

// DOM
const chat = document.getElementById('chat');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const alwaysOnToggle = document.getElementById('always-on-toggle');
const sensitivitySlider = document.getElementById('sensitivity-slider');
const ttsToggle = document.getElementById('tts-toggle');
const thinkToggle = document.getElementById('think-toggle');
const clearBtn = document.getElementById('clear-btn');
const statusText = document.getElementById('status-text');
const connDot = document.getElementById('connection-dot');
const volumeFill = document.getElementById('volume-fill');
const thresholdLine = document.getElementById('threshold-line');
const modelSelect = document.getElementById('model-select');

let currentAssistantEl = null;
let currentThinkingEl = null;
let currentToolCard = null;

// Memory state
const memoryChip = document.getElementById('memory-chip');
const memoryPanel = document.getElementById('memory-panel');
const memCountEl = document.getElementById('mem-count');
const memFactsEl = document.getElementById('mem-facts');
const memSessionsEl = document.getElementById('mem-sessions');
const memWorkingEl = document.getElementById('mem-working');

// Agent mode state
const agentToggle = document.getElementById('agent-toggle');
let agentContainerEl = null;
let agentStepsEl = null;
let agentCurrentStepEl = null;
let agentCurrentStepBody = null;
let agentPlanItems = [];
let agentRunning = false;

// ---------------------------------------------------------------------------
// Tool metadata
// ---------------------------------------------------------------------------
const TOOL_META = {
  weather:       { icon: '\u26C5', label: 'Weather',    accent: '#64b5f6' },
  music_control: { icon: '\uD83C\uDFB5', label: 'Music',      accent: '#f48fb1' },
  smart_home:    { icon: '\uD83D\uDCA1', label: 'Smart Home',  accent: '#ffd54f' },
  reminders:     { icon: '\u2705', label: 'Reminders',   accent: '#81c784' },
  notes:         { icon: '\uD83D\uDCDD', label: 'Notes',       accent: '#ce93d8' },
  summarize:     { icon: '\uD83D\uDCC4', label: 'Summary',     accent: '#b39ddb' },
  messaging:     { icon: '\uD83D\uDCAC', label: 'Messages',    accent: '#4dd0e1' },
  stocks:        { icon: '\uD83D\uDCC8', label: 'Stocks',      accent: '#4caf50' },
  gmail:         { icon: '\u2709\uFE0F', label: 'Gmail',       accent: '#ea4335' },
  calendar:      { icon: '\uD83D\uDCC5', label: 'Calendar',    accent: '#4285f4' },
  trips:         { icon: '\u2708\uFE0F', label: 'Trips',       accent: '#26c6da' },
  daily_brief:   { icon: '\u2600\uFE0F', label: 'Daily Brief', accent: '#ffc107' },
};

// ---------------------------------------------------------------------------
// ---------------------------------------------------------------------------
// Fetch available models from Ollama
// ---------------------------------------------------------------------------
async function fetchModels() {
  try {
    const resp = await fetch('/api/models');
    const { models, default: defaultModel } = await resp.json();
    const saved = localStorage.getItem('model');
    modelSelect.innerHTML = '';
    models.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name;
      opt.textContent = name;
      modelSelect.appendChild(opt);
    });
    // Restore saved selection, or fall back to server default
    const target = saved && models.includes(saved) ? saved : defaultModel;
    modelSelect.value = target;
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'set_model', model: target }));
    }
  } catch {
    // Keep whatever is in the dropdown
  }
}

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connDot.classList.add('connected');
    connDot.title = 'Connected';
    setStatus('Ready');
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
    fetchModels();
  };

  ws.onclose = () => {
    connDot.classList.remove('connected');
    connDot.title = 'Disconnected';
    setStatus('Disconnected. Reconnecting...');
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {};

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleServerMsg(data);
  };
}

function handleServerMsg(data) {
  switch (data.type) {
    case 'transcription':
      addMessage('user', data.text);
      setStatus('Thinking...');
      break;

    case 'llm_start':
      setStatus('Waiting for model...');
      break;

    case 'thinking_start':
      currentThinkingEl = addMessage('thinking', '');
      currentThinkingEl.innerHTML = '<span class="thinking-label">Deep thinking<span class="thinking-dots"></span></span>';
      setStatus('Deep thinking...');
      break;

    case 'thinking_token':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) {
          const textNode = document.createTextNode(data.token);
          currentThinkingEl.appendChild(textNode);
        } else {
          currentThinkingEl.appendChild(document.createTextNode(data.token));
        }
        currentThinkingEl.scrollTop = currentThinkingEl.scrollHeight;
        scrollToBottom();
      }
      break;

    case 'thinking_done':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) label.innerHTML = 'Thought';
        currentThinkingEl.style.maxHeight = '40px';
        currentThinkingEl = null;
      }
      currentAssistantEl = addMessage('assistant', '');
      setStatus('Responding...');
      break;

    case 'llm_token':
      if (!currentAssistantEl) {
        currentAssistantEl = addMessage('assistant', '');
        setStatus('Responding...');
      }
      currentAssistantEl.textContent += data.token;
      scrollToBottom();
      break;

    case 'llm_done':
      if (currentAssistantEl) {
        renderMarkdown(currentAssistantEl, data.text);
      }
      currentAssistantEl = null;
      currentThinkingEl = null;
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        // Show timing info briefly then go idle
        if (data.timing) {
          const tt = data.timing.total_ms;
          const ts = tt >= 1000 ? (tt/1000).toFixed(1) + 's' : tt + 'ms';
          setStatus('Done in ' + ts);
          setTimeout(() => setStatus('idle'), 3000);
        } else {
          setStatus('idle');
        }
        updateMicState();
      }
      if (ttsToggle.checked && data.text) {
        speak(data.text);
      }
      break;

    case 'think_decision':
      if (data.enabled) {
        addMessage('system', 'Deep thinking enabled for this query');
      }
      break;

    case 'tool_call':
      currentToolCard = addToolCallCard(data.name, data.args);
      {
        const meta = TOOL_META[data.name];
        const label = meta ? meta.icon + ' Running ' + meta.label : 'Running ' + data.name;
        setStatus(label + '...');
      }
      break;

    case 'tool_result':
      if (currentToolCard) {
        updateToolCard(currentToolCard, data.name, data.args, data.result);
        currentToolCard = null;
      }
      setStatus('Composing response...');
      break;

    case 'status':
      setStatus(data.text);
      break;

    case 'error':
      addMessage('error', data.text);
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      break;

    case 'cleared':
      chat.innerHTML = '<div class="msg system">Conversation cleared.</div>';
      break;

    case 'model_set':
      addMessage('system', 'Model set to ' + data.model);
      break;

    // --- Memory ---
    case 'memory_status':
      updateMemoryChip(data.facts_count, data.sessions_count, data.working_summary);
      break;

    case 'memory_detail':
      renderMemoryPanel(data.facts, data.sessions, data.working);
      break;

    // --- Agent Mode ---
    case 'agent_start':
      agentRunning = true;
      agentContainerEl = document.createElement('div');
      agentContainerEl.className = 'agent-container';
      agentContainerEl.innerHTML =
        '<div class="agent-header">' +
          '<span class="agent-badge running">AGENT</span>' +
          '<span class="agent-goal">' + escapeHtml(data.goal) + '</span>' +
          '<button class="agent-stop-btn" onclick="stopAgent()">Stop</button>' +
        '</div>';
      agentStepsEl = document.createElement('div');
      agentStepsEl.className = 'agent-steps';
      agentContainerEl.appendChild(agentStepsEl);
      chat.appendChild(agentContainerEl);
      setStatus('Agent: Planning...');
      scrollToBottom();
      break;

    case 'agent_plan':
      if (agentContainerEl) {
        var planEl = document.createElement('div');
        planEl.className = 'agent-plan';
        planEl.innerHTML = '<div class="agent-plan-title">Plan</div>';
        var listEl = document.createElement('div');
        listEl.className = 'agent-plan-list';
        agentPlanItems = [];
        (data.steps || []).forEach(function(s, idx) {
          var item = document.createElement('div');
          item.className = 'agent-plan-item';
          item.innerHTML = '<span class="agent-plan-num">' + (idx+1) + '</span><span>' + escapeHtml(s) + '</span>';
          listEl.appendChild(item);
          agentPlanItems.push(item);
        });
        planEl.appendChild(listEl);
        agentContainerEl.insertBefore(planEl, agentStepsEl);
        scrollToBottom();
      }
      break;

    case 'agent_plan_revised':
      // Update plan items for remaining steps
      if (data.steps && data.steps.length > 0) {
        addMessage('system', 'Agent revised plan: ' + data.steps.length + ' steps remaining');
      }
      break;

    case 'agent_step_start':
      if (agentStepsEl) {
        // Mark current plan item as active
        if (agentPlanItems[data.step - 1]) {
          agentPlanItems.forEach(function(item) { item.classList.remove('active'); });
          agentPlanItems[data.step - 1].classList.add('active');
        }
        agentCurrentStepEl = document.createElement('div');
        agentCurrentStepEl.className = 'agent-step';
        agentCurrentStepEl.innerHTML =
          '<div class="agent-step-header">' +
            '<span class="agent-step-num">' + data.step + '</span>' +
            '<span class="agent-step-desc">' + escapeHtml(data.description || 'Step ' + data.step) + '</span>' +
            '<span class="agent-step-status">running</span>' +
          '</div>';
        agentCurrentStepBody = document.createElement('div');
        agentCurrentStepBody.className = 'agent-step-body';
        agentCurrentStepEl.appendChild(agentCurrentStepBody);
        agentStepsEl.appendChild(agentCurrentStepEl);
        setStatus('Agent: Step ' + data.step + ' of ' + (data.total || '?') + '...');
        scrollToBottom();
      }
      break;

    case 'agent_token':
      if (agentCurrentStepBody) {
        var textEl = agentCurrentStepBody.querySelector('.agent-step-text');
        if (!textEl) {
          textEl = document.createElement('div');
          textEl.className = 'agent-step-text';
          agentCurrentStepBody.appendChild(textEl);
        }
        textEl.textContent += data.token;
        scrollToBottom();
      }
      break;

    case 'agent_tool_call':
      if (agentCurrentStepBody) {
        currentToolCard = addToolCallCard(data.name, data.args, agentCurrentStepBody);
        scrollToBottom();
      }
      break;

    case 'agent_tool_result':
      if (currentToolCard) {
        updateToolCard(currentToolCard, data.name, data.args, data.result);
        currentToolCard = null;
        scrollToBottom();
      }
      break;

    case 'agent_step_done':
      if (agentCurrentStepEl) {
        agentCurrentStepEl.classList.add('completed');
        var statusEl = agentCurrentStepEl.querySelector('.agent-step-status');
        if (statusEl) statusEl.textContent = 'done';
        // Mark plan item as done
        if (agentPlanItems[data.step - 1]) {
          agentPlanItems[data.step - 1].classList.remove('active');
          agentPlanItems[data.step - 1].classList.add('done');
        }
      }
      agentCurrentStepEl = null;
      agentCurrentStepBody = null;
      break;

    case 'agent_done':
      agentRunning = false;
      if (agentContainerEl) {
        // Update badge
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('done'); badge.textContent = 'DONE'; }
        // Remove stop button
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
        // Add summary
        if (data.summary) {
          var summaryEl = document.createElement('div');
          summaryEl.className = 'agent-summary';
          summaryEl.innerHTML =
            '<div class="agent-summary-title">Summary</div>' +
            '<div class="agent-summary-text">' + escapeHtml(data.summary) + '</div>';
          agentContainerEl.appendChild(summaryEl);
        }
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;

    case 'agent_error':
      agentRunning = false;
      if (agentContainerEl) {
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('error'); badge.textContent = 'ERROR'; }
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
        var errEl = document.createElement('div');
        errEl.className = 'agent-summary';
        errEl.style.background = 'rgba(255,180,171,0.06)';
        errEl.style.borderTopColor = 'rgba(255,180,171,0.15)';
        errEl.innerHTML =
          '<div class="agent-summary-title" style="color:var(--md-error)">Error</div>' +
          '<div class="agent-summary-text" style="color:var(--md-error)">' + escapeHtml(data.text || 'Unknown error') + '</div>';
        agentContainerEl.appendChild(errEl);
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;

    case 'agent_stopped':
      agentRunning = false;
      if (agentContainerEl) {
        var badge = agentContainerEl.querySelector('.agent-badge');
        if (badge) { badge.classList.remove('running'); badge.classList.add('stopped'); badge.textContent = 'STOPPED'; }
        var stopBtn = agentContainerEl.querySelector('.agent-stop-btn');
        if (stopBtn) stopBtn.remove();
      }
      agentContainerEl = null;
      agentStepsEl = null;
      agentPlanItems = [];
      setStatus('Ready');
      scrollToBottom();
      break;
  }
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'assistant' && text) {
    renderMarkdown(el, text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

function renderMarkdown(el, text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------------
// Tool card rendering
// ---------------------------------------------------------------------------
function addToolCallCard(name, args, parentEl) {
  const meta = TOOL_META[name] || { icon: '\uD83D\uDD27', label: name, accent: '#888' };
  const el = document.createElement('div');
  el.className = 'tool-card tool-' + name + ' loading';

  const detail = getToolDetail(name, args);

  el.innerHTML =
    '<div class="tool-header">' +
      '<span class="tool-icon">' + meta.icon + '</span>' +
      '<span class="tool-label">' + meta.label + '</span>' +
      (detail ? '<span class="tool-detail">' + escapeHtml(detail) + '</span>' : '') +
    '</div>' +
    '<div class="tool-body">Working on it</div>';

  (parentEl || chat).appendChild(el);
  scrollToBottom();
  return el;
}

function getToolDetail(name, args) {
  switch (name) {
    case 'weather': return args.location || '';
    case 'music_control': return formatMusicAction(args);
    case 'smart_home': return args.target || formatAction(args.action);
    case 'reminders': return args.title || formatAction(args.action);
    case 'notes': return args.title || formatAction(args.action);
    case 'summarize': return args.url ? getDomain(args.url) : '';
    case 'messaging':
      if (args.action === 'send') return '\u2192 ' + (args.to || '');
      return formatAction(args.action);
    case 'stocks':
      if (args.action === 'quote') return (args.symbol || '').toUpperCase();
      if (args.action === 'market') return 'Market Overview';
      if (args.action === 'watchlist') return 'Watchlist';
      return formatAction(args.action);
    case 'gmail':
      if (args.action === 'send') return '\u2192 ' + (args.to || '');
      if (args.action === 'search') return args.query || '';
      return formatAction(args.action);
    case 'calendar':
      if (args.action === 'create') return args.title || 'New Event';
      if (args.action === 'search') return args.query || '';
      return formatAction(args.action);
    case 'daily_brief': return '';
    default: return '';
  }
}

function formatAction(action) {
  return action ? action.replace(/_/g, ' ') : '';
}

function formatMusicAction(args) {
  const a = args.action || '';
  if (a === 'play_song' || a === 'play_artist' || a === 'play_album') {
    return (args.query || '') + (args.artist ? ' \u2022 ' + args.artist : '');
  }
  if (a === 'search') return 'search: ' + (args.query || '');
  return a.replace(/_/g, ' ');
}

function updateToolCard(el, name, args, result) {
  el.classList.remove('loading');

  const isError = result.startsWith('Error') || result.includes('not installed');
  if (isError) el.classList.add('tool-error');

  const detailEl = el.querySelector('.tool-detail');
  const newDetail = getResultDetail(name, args, result);
  if (detailEl && newDetail) detailEl.textContent = newDetail;

  const bodyEl = el.querySelector('.tool-body');
  bodyEl.innerHTML = renderToolBody(name, args, result);

  if (!isError) {
    const actionsHtml = renderToolActions(name, args);
    if (actionsHtml) {
      const actionsEl = document.createElement('div');
      actionsEl.className = 'tool-actions';
      actionsEl.innerHTML = actionsHtml;
      el.appendChild(actionsEl);
    }
  }

  scrollToBottom();
}

function getResultDetail(name, args, result) {
  if (name === 'music_control') {
    const app = (args.app === 'spotify') ? 'Spotify' : 'Apple Music';
    return app;
  }
  return null;
}

// ---------------------------------------------------------------------------
// Tool body renderers
// ---------------------------------------------------------------------------
function renderToolBody(name, args, result) {
  switch (name) {
    case 'weather':       return renderWeatherBody(result);
    case 'music_control': return renderMusicBody(args, result);
    case 'smart_home':    return renderSmartHomeBody(args, result);
    case 'reminders':     return renderRemindersBody(args, result);
    case 'notes':         return renderNotesBody(args, result);
    case 'summarize':     return renderSummarizeBody(args, result);
    case 'messaging':     return renderMessagingBody(args, result);
    case 'stocks':        return renderStocksBody(args, result);
    case 'gmail':         return renderGmailBody(args, result);
    case 'calendar':      return renderCalendarBody(args, result);
    case 'trips':         return renderTripsBody(args, result);
    case 'daily_brief':   return renderDailyBriefBody(args, result);
    default:              return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
  }
}

function renderWeatherBody(result) {
  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

function renderMusicBody(args, result) {
  const npMatch = result.match(/Now playing[^:]*:\s*(.+)/);
  if (npMatch) {
    const info = npMatch[1];
    const commaParts = info.split(/,\s*/);
    if (commaParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(commaParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(commaParts.slice(1).join(' \u2022 ')) + '</div>' +
      '</div>';
    }
    const byParts = info.split(/ by /);
    if (byParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(byParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(byParts.slice(1).join(' by ')) + '</div>' +
      '</div>';
    }
    return '<div class="music-info"><div class="music-track">' + escapeHtml(info) + '</div></div>';
  }

  const playingMatch = result.match(/Playing (.+?) on (Spotify|Apple Music)/);
  if (playingMatch) {
    return '<div class="music-info">' +
      '<div class="music-track">' + escapeHtml(playingMatch[1]) + '</div>' +
      '<div class="music-artist">' + escapeHtml(playingMatch[2]) + '</div>' +
    '</div>';
  }

  if (result.includes('\n')) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }

  return '<div class="music-status">' + escapeHtml(result) + '</div>';
}

function renderSmartHomeBody(args, result) {
  const action = args.action || '';

  if (action === 'turn_on' || action === 'turn_off') {
    const isOn = action === 'turn_on';
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot ' + (isOn ? 'on' : 'off') + '"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + (isOn ? 'ON' : 'OFF') + '</span>' +
    '</div>';
  }

  if (action === 'set_brightness') {
    const val = parseInt(args.value) || 50;
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot on"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + val + '%</span>' +
    '</div>' +
    '<div class="smart-brightness"><div class="smart-brightness-fill" style="width:' + val + '%"></div></div>';
  }

  if (action === 'set_color') {
    const target = args.target || 'Light';
    const color = args.value || '';
    return '<div class="smart-status">' +
      '<div class="smart-dot on" style="background:' + escapeHtml(color) + ';box-shadow:0 0 6px ' + escapeHtml(color) + '88"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + escapeHtml(color) + '</span>' +
    '</div>';
  }

  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

function renderRemindersBody(args, result) {
  if (args.action === 'add') {
    return '<div class="reminder-added">' +

function renderStocksBody(args, result) {
  let data;
  try { data = JSON.parse(result); } catch(e) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }
  if (data.error) return '<div class="tool-result-text" style="color:var(--md-error)">' + escapeHtml(data.error) + '</div>';

  const act = data.action;

  // Single quote
  if (act === 'quote') {
    const d = data.data;
    if (d.error) return '<div class="tool-result-text" style="color:var(--md-error)">' + escapeHtml(d.error) + '</div>';
    const up = d.change > 0; const dn = d.change < 0;
    const cls = up ? 'up' : dn ? 'down' : 'flat';
    const arrow = up ? '\u25B2' : dn ? '\u25BC' : '';
    const sign = up ? '+' : '';
    let html = '<div class="stock-quote">';
    // Header
    html += '<div class="stock-header">';
    html += '<span class="stock-symbol">' + escapeHtml(d.symbol) + '</span>';
    html += '<span class="stock-name">' + escapeHtml(d.name) + '</span>';
    if (d.sector) html += '<span class="stock-sector">' + escapeHtml(d.sector) + '</span>';
    html += '</div>';
    // Price + change
    html += '<div class="stock-price-row">';
    html += '<span class="stock-price">$' + (d.price != null ? d.price.toFixed(2) : 'N/A') + '</span>';
    if (d.change != null) {
      html += '<span class="stock-change ' + cls + '">' + arrow + ' ' + sign + d.change.toFixed(2) + ' (' + sign + d.change_pct.toFixed(2) + '%)</span>';
    }
    html += '</div>';
    // Sparkline
    if (d.spark && d.spark.length > 1) {
      const mn = Math.min(...d.spark); const mx = Math.max(...d.spark);
      const range = mx - mn || 1;
      html += '<div class="stock-spark">';
      d.spark.forEach(function(v, i) {
        const pct = ((v - mn) / range * 70) + 30;
        const clr = i === d.spark.length - 1 ? (d.change >= 0 ? '#4caf50' : '#ef5350') : 'rgba(160,100,240,0.3)';
        html += '<div class="stock-spark-bar" style="height:' + pct + '%;background:' + clr + '"></div>';
      });
      html += '</div>';
    }
    // 52-week range bar
    if (d.week52_low != null && d.week52_high != null && d.price != null) {
      const rng = d.week52_high - d.week52_low || 1;
      const pct = Math.min(100, Math.max(0, ((d.price - d.week52_low) / rng) * 100));
      html += '<div class="stock-range">';
      html += '<div class="stock-range-label">52-Week Range</div>';
      html += '<div class="stock-range-bar"><div class="stock-range-fill" style="width:100%"></div>';
      html += '<div class="stock-range-marker" style="left:' + pct.toFixed(1) + '%"></div></div>';
      html += '<div class="stock-range-ends"><span>$' + d.week52_low.toFixed(2) + '</span><span>$' + d.week52_high.toFixed(2) + '</span></div>';
      html += '</div>';
    }
    // Stats grid
    html += '<div class="stock-stats">';
    if (d.open != null) html += '<div class="stock-stat"><span class="stock-stat-label">Open</span><span class="stock-stat-value">$' + d.open.toFixed(2) + '</span></div>';
    if (d.prev_close != null) html += '<div class="stock-stat"><span class="stock-stat-label">Prev Close</span><span class="stock-stat-value">$' + d.prev_close.toFixed(2) + '</span></div>';
    if (d.day_high != null && d.day_low != null) html += '<div class="stock-stat"><span class="stock-stat-label">Day Range</span><span class="stock-stat-value">$' + d.day_low.toFixed(2) + ' - $' + d.day_high.toFixed(2) + '</span></div>';
    if (d.market_cap && d.market_cap !== 'N/A') html += '<div class="stock-stat"><span class="stock-stat-label">Market Cap</span><span class="stock-stat-value">' + escapeHtml(d.market_cap) + '</span></div>';
    if (d.pe_ratio != null) html += '<div class="stock-stat"><span class="stock-stat-label">P/E Ratio</span><span class="stock-stat-value">' + d.pe_ratio.toFixed(2) + '</span></div>';
    if (d.volume && d.volume !== 'N/A') html += '<div class="stock-stat"><span class="stock-stat-label">Volume</span><span class="stock-stat-value">' + escapeHtml(d.volume) + '</span></div>';
    html += '</div>';
    html += '</div>';
    return html;
  }

  // Watchlist or Market
  if (act === 'watchlist' || act === 'market') {
    const items = data.data;
    if (!items || !items.length) return '<div class="tool-result-text">No data available.</div>';
    let html = '<div class="stock-list">';
    items.forEach(function(d) {
      if (d.error) {
        html += '<div class="stock-list-item"><span class="stock-list-sym">' + escapeHtml(d.symbol) + '</span><span class="stock-list-name" style="color:var(--md-error)">Error</span></div>';
        return;
      }
      const up = d.change > 0; const dn = d.change < 0;
      const cls = up ? 'up' : dn ? 'down' : 'flat';
      const sign = up ? '+' : '';
      html += '<div class="stock-list-item">';
      html += '<span class="stock-list-sym">' + escapeHtml(d.symbol.replace('^', '')) + '</span>';
      html += '<span class="stock-list-name">' + escapeHtml(d.name) + '</span>';
      html += '<span class="stock-list-price">$' + (d.price != null ? d.price.toFixed(2) : 'N/A') + '</span>';
      if (d.change_pct != null) {
        html += '<span class="stock-list-change ' + cls + '">' + sign + d.change_pct.toFixed(2) + '%</span>';
      }
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

function renderTripsBody(args, result) {
  let data;
  try { data = JSON.parse(result); } catch(e) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }
  if (data.error) return '<div class="tool-result-text" style="color:var(--md-error)">' + escapeHtml(data.error) + '</div>';

  const typeIcons = { flight: '\u2708\uFE0F', hotel: '\uD83C\uDFE8', airbnb: '\uD83C\uDFE0', car_rental: '\uD83D\uDE97', train: '\uD83D\uDE82', event: '\uD83C\uDFAB', travel: '\u2708\uFE0F' };
  const typeLabels = { flight: 'Flight', hotel: 'Hotel', airbnb: 'Airbnb', car_rental: 'Car Rental', train: 'Train', event: 'Event', travel: 'Trip' };

  function daysUntil(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const now = new Date(); now.setHours(0,0,0,0);
    return Math.ceil((d - now) / 86400000);
  }
  function fmtDate(dateStr) {
    try {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
    } catch(e) { return dateStr; }
  }
  function urgencyLabel(days) {
    if (days <= 0) return '<span style="color:#ff5252;font-weight:700">Today!</span>';
    if (days === 1) return '<span style="color:#ff9800;font-weight:600">Tomorrow</span>';
    if (days <= 7) return '<span style="color:#ffb74d;font-weight:600">In ' + days + ' days</span>';
    return '<span style="color:var(--md-on-surface-var)">In ' + days + ' days</span>';
  }

  // Create events confirmation
  if (data.action === 'create_events') {
    const created = data.created || [];
    if (!created.length) return '<div class="cal-empty">All trips are already on your calendar.</div>';
    let html = '<div class="trip-created-status">\u2713 Added ' + created.length + ' event' + (created.length > 1 ? 's' : '') + ' to calendar</div>';
    html += '<div class="trip-created-list">';
    created.forEach(function(ev) {
      if (ev.error) {
        html += '<div class="trip-created-item" style="border-left-color:var(--md-error)">\u274C ' + escapeHtml(ev.title || 'Event') + ': ' + escapeHtml(ev.error) + '</div>';
      } else {
        html += '<div class="trip-created-item">' + escapeHtml(ev.title || 'Event');
        if (ev.start) html += ' \u2014 ' + fmtDate(ev.start) + (ev.end && ev.end !== ev.start ? ' to ' + fmtDate(ev.end) : '');
        html += '</div>';
      }
    });
    html += '</div>';
    return html;
  }

  // Scan results
  const trips = data.trips || [];
  if (!trips.length) return '<div class="cal-empty">No upcoming trips found in recent emails.</div>';

  const missing = data.missing_from_calendar || 0;

  let html = '';
  // Summary bar
  html += '<div class="trip-summary">';
  html += '<div class="trip-summary-stat"><span class="trip-summary-num">' + trips.length + '</span> upcoming</div>';
  if (missing > 0) {
    html += '<div class="trip-summary-stat" style="color:#ff9800">\u26A0\uFE0F <span class="trip-summary-num">' + missing + '</span> not on calendar</div>';
  } else {
    html += '<div class="trip-summary-stat" style="color:#4caf50">\u2705 All on calendar</div>';
  }
  html += '</div>';

  html += '<div class="trip-list">';
  trips.forEach(function(t, i) {
    const icon = typeIcons[t.type] || '\u2708\uFE0F';
    const label = typeLabels[t.type] || 'Trip';
    const firstDate = (t.dates && t.dates.length) ? t.dates[0] : null;
    const days = firstDate ? daysUntil(firstDate) : null;
    const isNext = i === 0; // first trip = soonest

    html += '<div class="trip-item' + (isNext ? ' trip-next' : '') + '">';
    html += '<div class="trip-icon">' + icon + '</div>';
    html += '<div class="trip-details">';
    // Location-based title if available, otherwise clean subject
    if (t.locations && t.locations.length) {
      html += '<div class="trip-subject">' + escapeHtml(label) + ' \u2192 ' + t.locations.map(function(l) { return escapeHtml(l); }).join(', ') + '</div>';
    } else {
      html += '<div class="trip-subject">' + escapeHtml(t.subject || label) + '</div>';
    }
    // Date + countdown
    if (firstDate) {
      const dateRange = t.dates.length > 1 ? fmtDate(t.dates[0]) + ' \u2013 ' + fmtDate(t.dates[t.dates.length-1]) : fmtDate(t.dates[0]);
      html += '<div class="trip-dates">' + dateRange + (days !== null ? ' \u00B7 ' + urgencyLabel(days) : '') + '</div>';
    }
    // Calendar status
    if (t.has_calendar_event) {
      html += '<div class="trip-cal-status trip-cal-yes">\u2713 On calendar</div>';
    } else {
      html += '<div class="trip-cal-status trip-cal-no">\u26A0 Not on calendar</div>';
    }
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function renderDailyBriefBody(args, result) {
  let data;
  try { data = JSON.parse(result); } catch(e) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }
  if (data.error) return '<div class="brief-error">' + escapeHtml(data.error) + '</div>';

  function fmtDate(d) {
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
  }
  function daysUntil(d) {
    const now = new Date(); now.setHours(0,0,0,0);
    const dt = new Date(d + 'T00:00:00');
    return Math.round((dt - now) / 86400000);
  }
  function shortFrom(from) {
    const m = from.match(/^([^<]+)/);
    const name = m ? m[1].trim().replace(/"/g, '') : from;
    return name.length > 18 ? name.slice(0, 18) + '\u2026' : name;
  }

  let html = '<div class="brief">';

  if (data.weather && data.weather.ok) {
    // Parse wttr.in format: "☀️ +2°C (feels like +0°C), ↘8km/h wind, 87% humidity"
    var wt = data.weather.text;
    var wIcon = '', wTemp = '', wFeels = '', wWind = '', wHumid = '';
    // Extract emoji icon (first non-space chars before the temperature)
    var wm = wt.match(/^([^\d+-]*)\s*([+-]?\d+°[CF])/);
    if (wm) { wIcon = wm[1].trim(); wTemp = wm[2]; }
    var fm = wt.match(/feels\s+like\s+([+-]?\d+°[CF])/i);
    if (fm) wFeels = fm[1];
    var windm = wt.match(/([^\s,]*\d+km\/h)\s*wind/i) || wt.match(/([^\s,]*\d+mph)\s*wind/i);
    if (windm) wWind = windm[1].replace(/[↑↓←→↗↘↖↙]/g, '').trim();
    var humm = wt.match(/(\d+%)\s*humidity/i);

      html += '<div class="brief-weather-main">';

      if (wFeels) html += '<div class="brief-weather-feels">Feels like ' + escapeHtml(wFeels) + '</div>';
      html += '</div>';
      html += '<div class="brief-weather-details">';
      if (wWind) html += '<div class="brief-weather-detail">\uD83D\uDCA8 ' + escapeHtml(wWind) + '</div>';
      if (wHumid) html += '<div class="brief-weather-detail">\uD83D\uDCA7 ' + escapeHtml(wHumid) + '</div>';
      html += '</div>';
      html += '</div>';
    } else {
      html += '<div class="brief-weather-text">' + escapeHtml(wt) + '</div>';
    }
  } else {
    html += '<div class="brief-error">' + escapeHtml((data.weather && data.weather.error) || 'Unavailable') + '</div>';
  }
  html += '</div>';

  // --- Stocks ---
  html += '<div class="brief-section">';
  html += '<div class="brief-section-head"><span class="brief-section-icon">\uD83D\uDCC8</span><span class="brief-section-label">' +
    ((data.stocks && data.stocks.action === 'watchlist') ? 'Watchlist' : 'Markets') + '</span></div>';
  if (data.stocks && data.stocks.ok && data.stocks.data && data.stocks.data.length) {
    data.stocks.data.forEach(function(s) {
      if (s.error) {
        html += '<div class="brief-stock-row"><span class="brief-stock-sym">' + escapeHtml(s.symbol) + '</span><span class="brief-stock-name" style="color:var(--md-error)">Error</span></div>';
        return;
      }
      const up = s.change > 0, dn = s.change < 0;
      const cls = up ? 'up' : dn ? 'down' : 'flat';
      const sign = up ? '+' : '';
      html += '<div class="brief-stock-row">';
      html += '<span class="brief-stock-sym">' + escapeHtml((s.symbol || '').replace('^', '')) + '</span>';
      html += '<span class="brief-stock-name">' + escapeHtml(s.name || '') + '</span>';
      html += '<span class="brief-stock-price">$' + (s.price != null ? s.price.toFixed(2) : 'N/A') + '</span>';
      if (s.change_pct != null) {
        html += '<span class="brief-stock-chg ' + cls + '">' + sign + s.change_pct.toFixed(2) + '%</span>';
      }
      html += '</div>';
    });
  } else if (data.stocks && data.stocks.error) {
    html += '<div class="brief-error">' + escapeHtml(data.stocks.error) + '</div>';
  } else {
    html += '<div class="brief-empty">No stock data.</div>';
  }
  html += '</div>';

  // --- Emails ---
  html += '<div class="brief-section">';
  html += '<div class="brief-section-head"><span class="brief-section-icon">\u2709\uFE0F</span><span class="brief-section-label">Unread Emails</span>';
  if (data.emails && data.emails.ok && data.emails.total > 0) {
    html += '<span class="brief-email-badge">' + data.emails.total + '</span>';
  }
  html += '</div>';
  if (data.emails && data.emails.ok) {
    if (data.emails.emails && data.emails.emails.length) {
      data.emails.emails.forEach(function(e) {
        html += '<div class="brief-email-row">';
        html += '<span class="brief-email-from">' + escapeHtml(shortFrom(e.from || '')) + '</span>';
        html += '<span class="brief-email-subj">' + escapeHtml(e.subject || '(no subject)') + '</span>';
        html += '</div>';
      });
      if (data.emails.total > data.emails.emails.length) {
        html += '<div class="brief-empty">+ ' + (data.emails.total - data.emails.emails.length) + ' more unread</div>';
      }
    } else {
      html += '<div class="brief-empty">Inbox zero \u2014 nice!</div>';
    }
  } else if (data.emails && data.emails.error) {
    html += '<div class="brief-error">' + escapeHtml(data.emails.error) + '</div>';
  }
  html += '</div>';

  // --- Trips ---
  if (data.trips && data.trips.ok && data.trips.trips && data.trips.trips.length) {
    html += '<div class="brief-section">';
    html += '<div class="brief-section-head"><span class="brief-section-icon">\u2708\uFE0F</span><span class="brief-section-label">Upcoming Trips</span></div>';
    data.trips.trips.slice(0, 4).forEach(function(t) {
      const icon = _TYPE_ICONS[t.type] || '\u2708\uFE0F';
      const dateStr = t.dates && t.dates.length ? fmtDate(t.dates[0]) + (t.dates.length > 1 ? ' \u2013 ' + fmtDate(t.dates[t.dates.length - 1]) : '') : '';
      const days = t.dates && t.dates[0] ? daysUntil(t.dates[0]) : null;
      const countdown = days != null ? (days === 0 ? 'Today!' : days === 1 ? 'Tomorrow' : days + 'd away') : '';
      const locStr = t.locations && t.locations.length ? t.locations.join(' \u2192 ') : '';
      const title = locStr || t.subject || t.type;
      html += '<div class="brief-trip-row">';
      html += '<span class="brief-trip-icon">' + icon + '</span>';
      html += '<div class="brief-trip-info">';
      html += '<div class="brief-trip-title">' + escapeHtml(title) + '</div>';
      html += '<div class="brief-trip-meta">' + escapeHtml(dateStr) + (countdown ? ' \u2022 ' + countdown : '') + '</div>';
      html += '</div></div>';
    });
    html += '</div>';
  }

  html += '</div>'; // end brief-sections

  // --- Music Suggestion ---
  if (data.music) {
    const q = (data.music.query || '').replace(/'/g, "\\'");
    html += '<div class="brief-music">';
    html += '<div class="brief-music-info">';
    html += '<div class="brief-music-vibe">\uD83C\uDFB5 ' + escapeHtml(data.music.vibe || 'Music') + '</div>';
    html += '<div class="brief-music-hint">Suggested playlist for your ' + escapeHtml(data.time_of_day || 'day') + '</div>';
    html += '</div>';
    html += '<button class="brief-music-play" onclick="quickAction(\'play ' + q + ' on spotify\');">\u25B6 Play</button>';
    html += '</div>';
  }

  html += '</div>'; // end brief
  return html;
}

// ---------------------------------------------------------------------------
// Tool action buttons
// ---------------------------------------------------------------------------
function renderToolActions(name, args) {
  switch (name) {
    case 'music_control':
      return '<button onclick="quickAction(\'play the previous track\')">\u23EE</button>' +
        '<button onclick="quickAction(\'pause the music\')">\u23EF</button>' +
        '<button onclick="quickAction(\'skip to the next track\')">\u23ED</button>' +
        '<button onclick="quickAction(\'what song is currently playing\')">\uD83C\uDFB5 Now</button>';

    case 'smart_home':
      if (args.target && (args.action === 'turn_on' || args.action === 'turn_off')) {
        const opposite = args.action === 'turn_on' ? 'turn off' : 'turn on';
        return '<button onclick="quickAction(\'' + opposite + ' ' + escapeHtml(args.target).replace(/'/g,"\\'") + '\')">' +
          (args.action === 'turn_on' ? 'Turn Off' : 'Turn On') + '</button>';
      }
      return null;

    case 'reminders':
      if (args.action !== 'add') {
        return '<button onclick="quickAction(\'show today\\\'s reminders\')">Today</button>' +
          '<button onclick="quickAction(\'show overdue reminders\')">Overdue</button>';
      }
      return null;

    case 'notes':
      if (args.action !== 'create') {
        return '<button onclick="quickAction(\'list my notes\')">All Notes</button>';
      }
      return null;

    case 'stocks':
      if (args.action === 'quote' && args.symbol) {
        return '<button onclick="quickAction(\'market overview\')">Market</button>' +
          '<button onclick="quickAction(\'watchlist AAPL,TSLA,GOOG,MSFT\')">Watchlist</button>';
      }
      if (args.action === 'market' || args.action === 'watchlist') {
        return '<button onclick="quickAction(\'market overview\')">Market</button>';
      }
      return null;

    case 'gmail':
      if (args.action !== 'send') {
        return '<button onclick="quickAction(\'check my unread emails\')">Unread</button>' +
          '<button onclick="quickAction(\'search emails from today\')">Today</button>';
      }
      return null;

    case 'calendar':
      if (args.action !== 'create') {
        return '<button onclick="quickAction(\'today\\\'s schedule\')">Today</button>' +
          '<button onclick="quickAction(\'tomorrow\\\'s schedule\')">Tomorrow</button>' +
          '<button onclick="quickAction(\'this week\\\'s events\')">Week</button>';
      }
      return null;

    case 'trips':
      if (args.action === 'scan') {
        return '<button onclick="quickAction(\'add my trips to calendar\')">Add to Calendar</button>' +
          '<button onclick="quickAction(\'scan my upcoming trips\')">Rescan</button>';
      }
      return '<button onclick="quickAction(\'scan my upcoming trips\')">Scan Trips</button>';

    case 'daily_brief':
      return '<button onclick="quickAction(\'check my unread emails\')">All Emails</button>' +
        '<button onclick="quickAction(\'scan my upcoming trips\')">All Trips</button>' +
        '<button onclick="quickAction(\'market overview\')">Markets</button>' +
        '<button onclick="quickAction(\'daily brief\')">Refresh</button>';

    default:
      return null;
  }
}

}

});

function sendText() {
  const t = textInput.value.trim();
  if (!t || !ws || ws.readyState !== 1) return;

  if (agentToggle.checked && !agentRunning) {
    addMessage('user', t);
    ws.send(JSON.stringify({ type: 'agent_start', goal: t }));

    return;

  ws.send(JSON.stringify({ type: 'text_input', text: t, model: modelSelect.value }));

// ---------------------------------------------------------------------------
// Audio capture
// ---------------------------------------------------------------------------
async function startListening() {
  if (isListening) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addMessage('error', 'Microphone access denied.');
    return;
  }

  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);

  isListening = true;
  updateMicState();
  setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Click mic to record');
  monitorVolume();
}

function stopListening() {
  isListening = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (micStream) {
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
    analyser = null;
  }

  isRecording = false;
  volumeFill.style.width = '0%';
  updateMicState();
  setStatus('Ready');
}

// ---------------------------------------------------------------------------
// VAD + volume monitoring
// ---------------------------------------------------------------------------
function monitorVolume() {
  if (!isListening || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const rms = Math.sqrt(data.reduce(function(a, v) { return a + v * v; }, 0) / data.length);

  const pct = Math.min(100, (rms / 80) * 100);
  volumeFill.style.width = pct + '%';

  const threshold = parseInt(sensitivitySlider.value);
  thresholdLine.style.left = Math.min(100, (threshold / 80) * 100) + '%';

  if (alwaysOnToggle.checked && !isProcessing) {
    vadLogic(rms, threshold);
  }

  requestAnimationFrame(monitorVolume);
}

function vadLogic(rms, threshold) {
  if (rms > threshold && !isRecording) {
    vadSpeechStart = Date.now();
    startRecording();
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms > threshold && isRecording) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms <= threshold && isRecording && !silenceTimer) {
    silenceTimer = setTimeout(function() {
      const duration = Date.now() - vadSpeechStart;
      if (duration >= MIN_SPEECH_MS) {
        stopRecording();
      } else {
        cancelRecording();
      }
      silenceTimer = null;
    }, SILENCE_MS);
  }
}

// ---------------------------------------------------------------------------
// MediaRecorder
// ---------------------------------------------------------------------------
function startRecording() {
  if (isRecording || !micStream) return;
  isRecording = true;
  updateMicState();

  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4', ''];
  let mimeType = '';
  for (const t of types) {
    if (!t || MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
  }

  const opts = mimeType ? { mimeType: mimeType } : {};
  mediaRecorder = new MediaRecorder(micStream, opts);

  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0 && ws && ws.readyState === 1) {
      ws.send(e.data);
    }
  };

  mediaRecorder.onstop = function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'audio_end' }));
    }
  };

  mediaRecorder.start(250);
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  isProcessing = true;
  updateMicState();

  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cancelRecording() {
  if (!mediaRecorder) return;
  isRecording = false;
  updateMicState();

  mediaRecorder.ondataavailable = null;
  mediaRecorder.onstop = null;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ---------------------------------------------------------------------------
// Mic button
// ---------------------------------------------------------------------------
micBtn.addEventListener('click', async function() {
  if (isProcessing) return;

  if (isRecording) {
    stopRecording();
    return;
  }

  if (alwaysOnToggle.checked) {
    if (isListening) {
      stopListening();
    } else {
      await startListening();
    }
    return;
  }

  if (!isListening) {
    await startListening();
    if (!isListening) return;
  }
  startRecording();
  if (isRecording) {
    setStatus('Recording... click mic to send');
  }
});

// ---------------------------------------------------------------------------
// TTS
// ---------------------------------------------------------------------------
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
let _statusTimer = null;
let _statusStart = 0;

function setStatus(text) {
  // Clear any running elapsed timer
  if (_statusTimer) { clearInterval(_statusTimer); _statusTimer = null; }

  if (text === 'idle') {
    statusText.textContent = isListening ? 'Listening...' : 'Ready';
    return;
  }

  // For active/waiting states, show an elapsed counter
  const isActive = text.endsWith('...') && text !== 'Disconnected. Reconnecting...';
  if (isActive) {
    _statusStart = Date.now();
    statusText.textContent = text;
    _statusTimer = setInterval(() => {
      const elapsed = ((Date.now() - _statusStart) / 1000).toFixed(1);
      statusText.textContent = text.replace('...', '') + ' (' + elapsed + 's)...';
    }, 200);
  } else {
    statusText.textContent = text;
  }
}

function updateMicState() {
  micBtn.classList.remove('listening', 'recording', 'processing');
  if (isProcessing) {
    micBtn.classList.add('processing');
    micBtn.title = 'Processing...';
  } else if (isRecording) {
    micBtn.classList.add('recording');
    micBtn.title = 'Click to send';
  } else if (isListening) {
    micBtn.classList.add('listening');
    micBtn.title = alwaysOnToggle.checked
      ? 'Listening (auto-detect speech)'
      : 'Click to record';
  } else {
    micBtn.title = 'Click to record';
  }
}

// Persist settings
alwaysOnToggle.checked = localStorage.getItem('alwaysOn') === 'true';
sensitivitySlider.value = localStorage.getItem('sensitivity') || '15';
ttsToggle.checked = localStorage.getItem('tts') === 'true';
thinkToggle.checked = localStorage.getItem('autoThink') === 'true';
if (localStorage.getItem('model')) {
  modelSelect.value = localStorage.getItem('model');
}

alwaysOnToggle.addEventListener('change', function() {
  localStorage.setItem('alwaysOn', alwaysOnToggle.checked);
  if (alwaysOnToggle.checked && !isListening) {
    startListening();
  }
  if (isListening) {
    setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Hold mic or spacebar to talk');
  }
  updateMicState();
});
sensitivitySlider.addEventListener('input', function() {
  localStorage.setItem('sensitivity', sensitivitySlider.value);
});
ttsToggle.addEventListener('change', function() {
  localStorage.setItem('tts', ttsToggle.checked);
});
thinkToggle.addEventListener('change', function() {
  localStorage.setItem('autoThink', thinkToggle.checked);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  }
});
// Agent mode
agentToggle.checked = localStorage.getItem('agentMode') === 'true';
agentToggle.addEventListener('change', function() {
  localStorage.setItem('agentMode', agentToggle.checked);
  updateAgentUI();
});

function updateAgentUI() {
  if (agentToggle.checked) {
    sendBtn.innerHTML = '<span class="material-symbols-rounded text-[22px]">smart_toy</span> Agent';
    sendBtn.style.background = '#ffb74d';
    sendBtn.style.color = '#1b1b22';
    textInput.placeholder = 'Describe a goal for the agent...';
  } else {
    sendBtn.innerHTML = '<span class="material-symbols-rounded text-[22px]">send</span> Send';
    sendBtn.style.background = '';
    sendBtn.style.color = '';
    textInput.placeholder = 'Type a message...';
  }
}
updateAgentUI();

// ---------------------------------------------------------------------------
// Memory
// ---------------------------------------------------------------------------
function updateMemoryChip(factsCount, sessionsCount, hasWorking) {
  memCountEl.textContent = factsCount;
  if (factsCount > 0) {
    memoryChip.classList.add('has-facts');
    memoryChip.title = factsCount + ' fact' + (factsCount !== 1 ? 's' : '') + ' remembered';
  } else {
    memoryChip.classList.remove('has-facts');
    memoryChip.title = 'Memory (empty)';
  }
}

function toggleMemoryPanel() {
  var isOpen = memoryPanel.classList.toggle('open');
  if (isOpen && ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'get_memory' }));
  }
}

// Close memory panel when clicking outside
document.addEventListener('click', function(e) {
  if (!memoryChip.contains(e.target) && !memoryPanel.contains(e.target)) {
    memoryPanel.classList.remove('open');
  }
});

function renderMemoryPanel(facts, sessions, working) {
  // Facts
  if (facts && facts.length > 0) {
    memFactsEl.innerHTML = facts.map(function(f) {
      return '<div class="memory-fact">\u2022 ' + escapeHtml(f) + '</div>';
    }).join('');
  } else {
    memFactsEl.innerHTML = '<span class="memory-empty">No facts stored yet</span>';
  }

  // Sessions
  if (sessions && sessions.length > 0) {
    memSessionsEl.innerHTML = sessions.map(function(s) {
      return '<div class="memory-session">' +
        '<span class="memory-session-date">' + escapeHtml(s.date || '') + '</span>' +
        escapeHtml(s.summary || '') +
      '</div>';
    }).join('');
  } else {
    memSessionsEl.innerHTML = '<span class="memory-empty">No past sessions</span>';
  }

  // Working
  if (working) {
    memWorkingEl.innerHTML = '<div class="memory-working">' + escapeHtml(working) + '</div>';
  } else {
    memWorkingEl.innerHTML = '<span class="memory-empty">Nothing compacted yet</span>';
  }
}

function clearMemory() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear_memory' }));
    memFactsEl.innerHTML = '<span class="memory-empty">No facts stored yet</span>';
    memSessionsEl.innerHTML = '<span class="memory-empty">No past sessions</span>';
    memWorkingEl.innerHTML = '<span class="memory-empty">Nothing compacted yet</span>';
    memoryPanel.classList.remove('open');
    addMessage('system', 'Memory cleared');
  }
}
