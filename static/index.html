<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hermit Crab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0f0f1a;
  --surface:   #1a1a2e;
  --surface2:  #252540;
  --user-bg:   #0f3460;
  --assist-bg: #1e1e3a;
  --accent:    #e94560;
  --accent2:   #4ecdc4;
  --text:      #e8e8e8;
  --text-dim:  #8888aa;
  --radius:    12px;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  font-size: 15px; overflow: hidden;
}

#app {
  display: flex; flex-direction: column; height: 100dvh;
  max-width: 800px; margin: 0 auto;
}

/* --- Header --- */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px; border-bottom: 1px solid var(--surface2);
  flex-shrink: 0;
}
header h1 { font-size: 18px; font-weight: 600; }
header h1 span { color: var(--accent); }
#connection-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--accent); transition: background 0.3s;
}
#connection-dot.connected { background: var(--accent2); }

#status-text {
  font-size: 12px; color: var(--text-dim); margin-left: 8px;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.header-right { display: flex; align-items: center; gap: 8px; }

#model-select {
  background: var(--surface2); color: var(--text); border: 1px solid #333;
  border-radius: 6px; padding: 4px 8px; font-size: 12px; cursor: pointer;
}

/* --- Chat --- */
#chat {
  flex: 1; overflow-y: auto; padding: 16px 20px;
  display: flex; flex-direction: column; gap: 12px;
  scroll-behavior: smooth;
}

.msg {
  max-width: 85%; padding: 10px 14px; border-radius: var(--radius);
  line-height: 1.5; white-space: pre-wrap; word-wrap: break-word;
  animation: fadeIn 0.2s ease;
}
.msg.user {
  align-self: flex-end; background: var(--user-bg);
  border-bottom-right-radius: 4px;
}
.msg.assistant {
  align-self: flex-start; background: var(--assist-bg);
  border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center; color: var(--text-dim); font-size: 13px;
  background: none; padding: 4px 0;
}
.msg.error {
  align-self: center; color: var(--accent); font-size: 13px;
  background: rgba(233,69,96,0.1); border: 1px solid rgba(233,69,96,0.3);
}
.msg.thinking {
  align-self: flex-start; color: var(--text-dim); font-size: 13px;
  background: rgba(78,205,196,0.05); border: 1px solid rgba(78,205,196,0.15);
  font-style: italic; max-height: 80px; overflow-y: auto;
}
.thinking-label {
  color: var(--accent2); font-weight: 600; font-style: normal;
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 4px; display: block;
}
@keyframes dots { 0%,20% { content: '.'; } 40% { content: '..'; } 60%,100% { content: '...'; } }
.thinking-dots::after { content: '...'; animation: dots 1.5s infinite steps(1); }

.msg code {
  background: rgba(255,255,255,0.08); padding: 1px 5px; border-radius: 4px;
  font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px;
}
.msg pre {
  background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px;
  overflow-x: auto; margin: 6px 0;
}
.msg pre code { background: none; padding: 0; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* --- Tool Cards --- */
.tool-card {
  align-self: flex-start;
  width: 92%; max-width: 440px;
  background: var(--surface);
  border-radius: var(--radius);
  border-left: 3px solid var(--accent2);
  padding: 12px 16px;
  animation: fadeIn 0.25s ease;
  font-size: 14px;
}
.tool-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
}
.tool-icon { font-size: 18px; line-height: 1; }
.tool-label {
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  letter-spacing: 0.5px; color: var(--accent2);
}
.tool-detail {
  color: var(--text-dim); font-size: 12px; margin-left: auto;
}
.tool-body {
  color: var(--text); line-height: 1.5;
}
.tool-result-text {
  white-space: pre-wrap; word-wrap: break-word; font-size: 13px;
  max-height: 240px; overflow-y: auto; margin: 0;
  background: none; border: none; padding: 0; color: var(--text);
  font-family: inherit;
}
.tool-actions {
  display: flex; gap: 6px; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--surface2); flex-wrap: wrap;
}
.tool-actions button {
  background: var(--surface2); border: none; color: var(--text);
  padding: 5px 12px; border-radius: 6px; cursor: pointer;
  font-size: 13px; transition: all 0.15s;
}
.tool-actions button:hover {
  background: var(--accent2); color: var(--bg);
}

/* Loading state */
.tool-card.loading .tool-body { color: var(--text-dim); font-style: italic; }
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.tool-card.loading .tool-body::after {
  content: '...'; animation: dots 1.5s infinite steps(1);
}

/* Error state */
.tool-card.tool-error { border-left-color: var(--accent); }
.tool-card.tool-error .tool-label { color: var(--accent); }

/* Tool-specific accent colors */
.tool-card.tool-weather { border-left-color: #60a5fa; }
.tool-card.tool-weather .tool-label { color: #60a5fa; }

.tool-card.tool-music_control { border-left-color: #e94560; }
.tool-card.tool-music_control .tool-label { color: #e94560; }

.tool-card.tool-smart_home { border-left-color: #f59e0b; }
.tool-card.tool-smart_home .tool-label { color: #f59e0b; }

.tool-card.tool-reminders { border-left-color: #22c55e; }
.tool-card.tool-reminders .tool-label { color: #22c55e; }

.tool-card.tool-notes { border-left-color: #f97316; }
.tool-card.tool-notes .tool-label { color: #f97316; }

.tool-card.tool-summarize { border-left-color: #a78bfa; }
.tool-card.tool-summarize .tool-label { color: #a78bfa; }

.tool-card.tool-messaging { border-left-color: #06b6d4; }
.tool-card.tool-messaging .tool-label { color: #06b6d4; }

/* --- Music-specific --- */
.music-info { display: flex; flex-direction: column; gap: 2px; }
.music-track { font-weight: 600; font-size: 15px; }
.music-artist { color: var(--text-dim); font-size: 13px; }
.music-status { font-size: 13px; color: var(--text-dim); }

/* --- Smart Home-specific --- */
.smart-status {
  display: flex; align-items: center; gap: 8px; font-size: 14px;
}
.smart-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
}
.smart-dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
.smart-dot.off { background: #666; }
.smart-target { font-weight: 500; }
.smart-state { color: var(--text-dim); font-size: 12px; text-transform: uppercase; }
.smart-brightness {
  margin-top: 6px; height: 4px; background: var(--surface2);
  border-radius: 2px; overflow: hidden;
}
.smart-brightness-fill {
  height: 100%; background: #f59e0b; border-radius: 2px;
  transition: width 0.3s;
}

/* --- Reminders-specific --- */
.reminder-list { display: flex; flex-direction: column; gap: 4px; }
.reminder-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 4px 0; font-size: 13px;
}
.reminder-check { color: var(--text-dim); flex-shrink: 0; }
.reminder-added {
  display: flex; align-items: center; gap: 8px; font-size: 14px;
}
.reminder-due {
  margin-left: auto; color: var(--text-dim); font-size: 12px;
}

/* --- Notes-specific --- */
.note-inner {
  background: rgba(249, 115, 22, 0.06);
  border: 1px solid rgba(249, 115, 22, 0.15);
  border-radius: 8px; padding: 10px 12px;
}
.note-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.note-preview { color: var(--text-dim); font-size: 13px; }
.notes-list { display: flex; flex-direction: column; gap: 3px; }
.notes-list-item { font-size: 13px; padding: 2px 0; }

/* --- Summarize-specific --- */
.summary-source {
  font-size: 11px; color: var(--text-dim); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.3px;
}
.summary-text { font-size: 13px; line-height: 1.6; }

/* --- Messaging-specific --- */
.msg-sent { display: flex; flex-direction: column; gap: 4px; }
.msg-to { font-size: 12px; color: var(--text-dim); }
.msg-bubble {
  background: var(--user-bg); padding: 8px 12px; border-radius: 10px;
  border-bottom-right-radius: 4px; align-self: flex-start;
  font-size: 14px; max-width: 90%;
}
.msg-status-sent {
  font-size: 11px; color: #22c55e; align-self: flex-end;
}
.msg-history { display: flex; flex-direction: column; gap: 4px; }
.msg-history-item { font-size: 13px; padding: 2px 0; }
.msg-history-item .msg-sender {
  font-weight: 600; font-size: 11px; text-transform: uppercase;
  color: var(--text-dim); margin-right: 6px;
}

/* --- Quick Actions Bar --- */
#quick-actions {
  display: flex; gap: 4px; margin-bottom: 8px;
  overflow-x: auto; scrollbar-width: none;
  padding: 2px 0;
}
#quick-actions::-webkit-scrollbar { display: none; }

.qa-btn {
  background: var(--surface2); border: 1px solid transparent;
  color: var(--text); padding: 5px 10px; border-radius: 18px;
  cursor: pointer; font-size: 13px; white-space: nowrap;
  transition: all 0.15s; flex-shrink: 0;
  display: flex; align-items: center; gap: 4px;
}
.qa-btn:hover {
  border-color: var(--accent2); background: rgba(78,205,196,0.1);
}
.qa-btn:active { transform: scale(0.95); }
.qa-icon { font-size: 14px; }
.qa-label { font-size: 11px; }

.qa-sep { margin-left: 4px; }

/* Music controls group */
.qa-group {
  display: flex; gap: 2px; background: var(--surface2); border-radius: 18px;
  overflow: hidden; flex-shrink: 0;
}
.qa-group .qa-btn {
  border-radius: 0; margin: 0; padding: 5px 8px;
  background: transparent;
}
.qa-group .qa-btn:first-child { border-radius: 18px 0 0 18px; padding-left: 10px; }
.qa-group .qa-btn:last-child { border-radius: 0 18px 18px 0; padding-right: 10px; }
.qa-group .qa-btn:hover { background: rgba(78,205,196,0.15); }

/* --- Footer --- */
footer {
  flex-shrink: 0; padding: 12px 20px 16px;
  border-top: 1px solid var(--surface2); background: var(--surface);
}

/* Volume meter */
#volume-container {
  height: 4px; background: var(--bg); border-radius: 2px;
  margin-bottom: 10px; overflow: hidden; position: relative;
}
#volume-fill {
  height: 100%; width: 0%; border-radius: 2px;
  background: var(--accent2); transition: width 0.05s;
}
#threshold-line {
  position: absolute; top: 0; height: 100%; width: 2px;
  background: var(--accent); left: 15%;
}

/* Input row */
#input-row {
  display: flex; gap: 8px; align-items: center;
}
#text-input {
  flex: 1; background: var(--bg); color: var(--text);
  border: 1px solid var(--surface2); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
#text-input:focus { border-color: var(--accent2); }

#send-btn {
  background: var(--accent2); color: var(--bg); border: none;
  border-radius: 8px; padding: 10px 16px; font-weight: 600;
  cursor: pointer; font-size: 14px; white-space: nowrap;
}
#send-btn:hover { filter: brightness(1.1); }

/* Mic button */
#mic-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 2px solid var(--text-dim); background: transparent;
  color: var(--text); font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; flex-shrink: 0;
}
#mic-btn:hover { border-color: var(--text); }
#mic-btn.listening {
  border-color: var(--accent2); color: var(--accent2);
  box-shadow: 0 0 0 3px rgba(78,205,196,0.2);
}
#mic-btn.recording {
  border-color: var(--accent); color: var(--accent);
  animation: pulse 1s infinite;
}
#mic-btn.processing {
  border-color: #f0a500; color: #f0a500;
  pointer-events: none; opacity: 0.7;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(233,69,96,0.2); }
  50%      { box-shadow: 0 0 0 8px rgba(233,69,96,0.1); }
}

/* Controls row */
#controls-row {
  display: flex; align-items: center; gap: 12px;
  margin-top: 8px; font-size: 12px; color: var(--text-dim);
}

.toggle-label {
  display: flex; align-items: center; gap: 4px; cursor: pointer;
  user-select: none;
}
.toggle-label input { accent-color: var(--accent2); }

#sensitivity-slider {
  width: 80px; accent-color: var(--accent2);
}

#clear-btn {
  margin-left: auto; background: none; border: 1px solid var(--surface2);
  color: var(--text-dim); border-radius: 6px; padding: 3px 10px;
  cursor: pointer; font-size: 12px;
}
#clear-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Scrollbar */
#chat::-webkit-scrollbar { width: 6px; }
#chat::-webkit-scrollbar-track { background: transparent; }
#chat::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div style="display:flex;align-items:center;gap:8px">
      <h1><span>&#129408;</span> Hermit Crab</h1>
      <div id="connection-dot" title="Disconnected"></div>
      <span id="status-text">Connecting...</span>
    </div>
    <div class="header-right">
      <select id="model-select">
        <option value="qwen3.5:4b" selected>qwen3.5:4b</option>
        <option value="qwen2.5:7b">qwen2.5:7b</option>
        <option value="qwen2.5:3b">qwen2.5:3b</option>
        <option value="qwen3:4b">qwen3:4b</option>
        <option value="llama3.2">llama3.2</option>
      </select>
    </div>
  </header>

  <div id="chat">
    <div class="msg system">Welcome. Click the mic or type below to start.</div>
  </div>

  <footer>
    <div id="volume-container">
      <div id="volume-fill"></div>
      <div id="threshold-line"></div>
    </div>

    <div id="quick-actions">
      <button class="qa-btn" data-cmd="what's the weather here" title="Check weather">
        <span class="qa-icon">&#9925;</span><span class="qa-label">Weather</span>
      </button>
      <div class="qa-group">
        <button class="qa-btn" data-cmd="play the previous track" title="Previous track">
          <span class="qa-icon">&#9198;</span>
        </button>
        <button class="qa-btn" data-cmd="pause the music" title="Play / Pause">
          <span class="qa-icon">&#9199;</span>
        </button>
        <button class="qa-btn" data-cmd="skip to the next track" title="Next track">
          <span class="qa-icon">&#9197;</span>
        </button>
        <button class="qa-btn" data-cmd="what song is currently playing" title="Now playing">
          <span class="qa-icon">&#127925;</span>
        </button>
      </div>
      <button class="qa-btn qa-sep" data-cmd="list the lights" title="Show lights">
        <span class="qa-icon">&#128161;</span><span class="qa-label">Lights</span>
      </button>
      <button class="qa-btn" data-cmd="show my reminders for today" title="Today's reminders">
        <span class="qa-icon">&#9989;</span><span class="qa-label">Tasks</span>
      </button>
      <button class="qa-btn" data-cmd="list my notes" title="List notes">
        <span class="qa-icon">&#128221;</span><span class="qa-label">Notes</span>
      </button>
      <button class="qa-btn" data-cmd="show my recent messages" title="Recent messages">
        <span class="qa-icon">&#128172;</span><span class="qa-label">Msgs</span>
      </button>
    </div>

    <div id="input-row">
      <input id="text-input" type="text" placeholder="Type a message..." autocomplete="off">
      <button id="send-btn">Send</button>
      <button id="mic-btn" title="Click to start listening">&#127908;</button>
    </div>
    <div id="controls-row">
      <label class="toggle-label">
        <input type="checkbox" id="always-on-toggle"> Always listen
      </label>
      <label class="toggle-label">
        Sensitivity
        <input type="range" id="sensitivity-slider" min="3" max="60" value="15">
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="think-toggle"> Auto think
      </label>
      <label class="toggle-label">
        <input type="checkbox" id="tts-toggle"> Speak replies
      </label>
      <button id="clear-btn">Clear chat</button>
    </div>
  </footer>
</div>

<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let ws = null;
let audioCtx = null;
let analyser = null;
let micStream = null;
let mediaRecorder = null;

let isListening = false;
let isRecording = false;
let isProcessing = false;

let vadSpeechStart = 0;
let silenceTimer = null;

const MIN_SPEECH_MS = 300;
const SILENCE_MS = 1500;

// DOM
const chat = document.getElementById('chat');
const textInput = document.getElementById('text-input');
const sendBtn = document.getElementById('send-btn');
const micBtn = document.getElementById('mic-btn');
const alwaysOnToggle = document.getElementById('always-on-toggle');
const sensitivitySlider = document.getElementById('sensitivity-slider');
const ttsToggle = document.getElementById('tts-toggle');
const thinkToggle = document.getElementById('think-toggle');
const clearBtn = document.getElementById('clear-btn');
const statusText = document.getElementById('status-text');
const connDot = document.getElementById('connection-dot');
const volumeFill = document.getElementById('volume-fill');
const thresholdLine = document.getElementById('threshold-line');
const modelSelect = document.getElementById('model-select');

let currentAssistantEl = null;
let currentThinkingEl = null;
let currentToolCard = null;

// ---------------------------------------------------------------------------
// Tool metadata
// ---------------------------------------------------------------------------
const TOOL_META = {
  weather:       { icon: '\u26C5', label: 'Weather',    accent: '#60a5fa' },
  music_control: { icon: '\uD83C\uDFB5', label: 'Music',      accent: '#e94560' },
  smart_home:    { icon: '\uD83D\uDCA1', label: 'Smart Home',  accent: '#f59e0b' },
  reminders:     { icon: '\u2705', label: 'Reminders',   accent: '#22c55e' },
  notes:         { icon: '\uD83D\uDCDD', label: 'Notes',       accent: '#f97316' },
  summarize:     { icon: '\uD83D\uDCC4', label: 'Summary',     accent: '#a78bfa' },
  messaging:     { icon: '\uD83D\uDCAC', label: 'Messages',    accent: '#06b6d4' },
};

// ---------------------------------------------------------------------------
// WebSocket
// ---------------------------------------------------------------------------
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws`);

  ws.onopen = () => {
    connDot.classList.add('connected');
    connDot.title = 'Connected';
    setStatus('Ready');
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  };

  ws.onclose = () => {
    connDot.classList.remove('connected');
    connDot.title = 'Disconnected';
    setStatus('Disconnected. Reconnecting...');
    setTimeout(connectWS, 2000);
  };

  ws.onerror = () => {};

  ws.onmessage = (ev) => {
    const data = JSON.parse(ev.data);
    handleServerMsg(data);
  };
}

function handleServerMsg(data) {
  switch (data.type) {
    case 'transcription':
      addMessage('user', data.text);
      setStatus('Processing...');
      break;

    case 'llm_start':
      break;

    case 'thinking_start':
      currentThinkingEl = addMessage('thinking', '');
      currentThinkingEl.innerHTML = '<span class="thinking-label">Deep thinking<span class="thinking-dots"></span></span>';
      setStatus('Deep thinking...');
      break;

    case 'thinking_token':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) {
          const textNode = document.createTextNode(data.token);
          currentThinkingEl.appendChild(textNode);
        } else {
          currentThinkingEl.appendChild(document.createTextNode(data.token));
        }
        currentThinkingEl.scrollTop = currentThinkingEl.scrollHeight;
        scrollToBottom();
      }
      break;

    case 'thinking_done':
      if (currentThinkingEl) {
        const label = currentThinkingEl.querySelector('.thinking-label');
        if (label) label.innerHTML = 'Thought';
        currentThinkingEl.style.maxHeight = '40px';
        currentThinkingEl = null;
      }
      currentAssistantEl = addMessage('assistant', '');
      setStatus('Responding...');
      break;

    case 'llm_token':
      if (!currentAssistantEl) {
        currentAssistantEl = addMessage('assistant', '');
      }
      currentAssistantEl.textContent += data.token;
      scrollToBottom();
      break;

    case 'llm_done':
      if (currentAssistantEl) {
        renderMarkdown(currentAssistantEl, data.text);
      }
      currentAssistantEl = null;
      currentThinkingEl = null;
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      if (ttsToggle.checked && data.text) {
        speak(data.text);
      }
      break;

    case 'think_decision':
      if (data.enabled) {
        addMessage('system', 'Deep thinking enabled for this query');
      }
      break;

    case 'tool_call':
      currentToolCard = addToolCallCard(data.name, data.args);
      setStatus('Running ' + (TOOL_META[data.name]?.label || data.name) + '...');
      break;

    case 'tool_result':
      if (currentToolCard) {
        updateToolCard(currentToolCard, data.name, data.args, data.result);
        currentToolCard = null;
      }
      break;

    case 'status':
      setStatus(data.text);
      break;

    case 'error':
      addMessage('error', data.text);
      isProcessing = false;
      if (!alwaysOnToggle.checked && isListening) {
        stopListening();
      } else {
        setStatus('idle');
        updateMicState();
      }
      break;

    case 'cleared':
      chat.innerHTML = '<div class="msg system">Conversation cleared.</div>';
      break;

    case 'model_set':
      addMessage('system', 'Model set to ' + data.model);
      break;
  }
}

// ---------------------------------------------------------------------------
// Messages
// ---------------------------------------------------------------------------
function addMessage(role, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  if (role === 'assistant' && text) {
    renderMarkdown(el, text);
  } else {
    el.textContent = text;
  }
  chat.appendChild(el);
  scrollToBottom();
  return el;
}

function scrollToBottom() {
  requestAnimationFrame(() => {
    chat.scrollTop = chat.scrollHeight;
  });
}

function renderMarkdown(el, text) {
  let html = escapeHtml(text);
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  el.innerHTML = html;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ---------------------------------------------------------------------------
// Tool card rendering
// ---------------------------------------------------------------------------
function addToolCallCard(name, args) {
  const meta = TOOL_META[name] || { icon: '\uD83D\uDD27', label: name, accent: '#888' };
  const el = document.createElement('div');
  el.className = 'tool-card tool-' + name + ' loading';

  const detail = getToolDetail(name, args);

  el.innerHTML =
    '<div class="tool-header">' +
      '<span class="tool-icon">' + meta.icon + '</span>' +
      '<span class="tool-label">' + meta.label + '</span>' +
      (detail ? '<span class="tool-detail">' + escapeHtml(detail) + '</span>' : '') +
    '</div>' +
    '<div class="tool-body">Working on it</div>';

  chat.appendChild(el);
  scrollToBottom();
  return el;
}

function getToolDetail(name, args) {
  switch (name) {
    case 'weather': return args.location || '';
    case 'music_control': return formatMusicAction(args);
    case 'smart_home': return args.target || formatAction(args.action);
    case 'reminders': return args.title || formatAction(args.action);
    case 'notes': return args.title || formatAction(args.action);
    case 'summarize': return args.url ? getDomain(args.url) : '';
    case 'messaging':
      if (args.action === 'send') return '\u2192 ' + (args.to || '');
      return formatAction(args.action);
    default: return '';
  }
}

function formatAction(action) {
  return action ? action.replace(/_/g, ' ') : '';
}

function formatMusicAction(args) {
  const a = args.action || '';
  if (a === 'play_song' || a === 'play_artist' || a === 'play_album') {
    return (args.query || '') + (args.artist ? ' \u2022 ' + args.artist : '');
  }
  if (a === 'search') return 'search: ' + (args.query || '');
  return a.replace(/_/g, ' ');
}

function updateToolCard(el, name, args, result) {
  el.classList.remove('loading');

  const isError = result.startsWith('Error') || result.includes('not installed');
  if (isError) el.classList.add('tool-error');

  // Update detail if needed
  const detailEl = el.querySelector('.tool-detail');
  const newDetail = getResultDetail(name, args, result);
  if (detailEl && newDetail) detailEl.textContent = newDetail;

  // Render body
  const bodyEl = el.querySelector('.tool-body');
  bodyEl.innerHTML = renderToolBody(name, args, result);

  // Add action buttons (skip on errors)
  if (!isError) {
    const actionsHtml = renderToolActions(name, args);
    if (actionsHtml) {
      const actionsEl = document.createElement('div');
      actionsEl.className = 'tool-actions';
      actionsEl.innerHTML = actionsHtml;
      el.appendChild(actionsEl);
    }
  }

  scrollToBottom();
}

function getResultDetail(name, args, result) {
  if (name === 'music_control') {
    const app = (args.app === 'spotify') ? 'Spotify' : 'Apple Music';
    return app;
  }
  return null;
}

// ---------------------------------------------------------------------------
// Tool body renderers
// ---------------------------------------------------------------------------
function renderToolBody(name, args, result) {
  switch (name) {
    case 'weather':       return renderWeatherBody(result);
    case 'music_control': return renderMusicBody(args, result);
    case 'smart_home':    return renderSmartHomeBody(args, result);
    case 'reminders':     return renderRemindersBody(args, result);
    case 'notes':         return renderNotesBody(args, result);
    case 'summarize':     return renderSummarizeBody(args, result);
    case 'messaging':     return renderMessagingBody(args, result);
    default:              return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
  }
}

// --- Weather ---
function renderWeatherBody(result) {
  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

// --- Music ---
function renderMusicBody(args, result) {
  // "Now playing on X: Song by Artist (Album)" or "Now playing: Song by Artist"
  const npMatch = result.match(/Now playing[^:]*:\s*(.+)/);
  if (npMatch) {
    const info = npMatch[1];
    // Apple Music returns "Song, Artist, Album" format
    const commaParts = info.split(/,\s*/);
    if (commaParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(commaParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(commaParts.slice(1).join(' \u2022 ')) + '</div>' +
      '</div>';
    }
    // Spotify returns "Song by Artist" or just "Song"
    const byParts = info.split(/ by /);
    if (byParts.length >= 2) {
      return '<div class="music-info">' +
        '<div class="music-track">' + escapeHtml(byParts[0]) + '</div>' +
        '<div class="music-artist">' + escapeHtml(byParts.slice(1).join(' by ')) + '</div>' +
      '</div>';
    }
    return '<div class="music-info"><div class="music-track">' + escapeHtml(info) + '</div></div>';
  }

  // "Playing Artist on Spotify (shuffled)."
  const playingMatch = result.match(/Playing (.+?) on (Spotify|Apple Music)/);
  if (playingMatch) {
    return '<div class="music-info">' +
      '<div class="music-track">' + escapeHtml(playingMatch[1]) + '</div>' +
      '<div class="music-artist">' + escapeHtml(playingMatch[2]) + '</div>' +
    '</div>';
  }

  // Multiline results (search, artist info, etc.)
  if (result.includes('\n')) {
    return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
  }

  // Simple status messages (paused, skipped, etc.)
  return '<div class="music-status">' + escapeHtml(result) + '</div>';
}

// --- Smart Home ---
function renderSmartHomeBody(args, result) {
  const action = args.action || '';

  if (action === 'turn_on' || action === 'turn_off') {
    const isOn = action === 'turn_on';
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot ' + (isOn ? 'on' : 'off') + '"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + (isOn ? 'ON' : 'OFF') + '</span>' +
    '</div>';
  }

  if (action === 'set_brightness') {
    const val = parseInt(args.value) || 50;
    const target = args.target || 'Light';
    return '<div class="smart-status">' +
      '<div class="smart-dot on"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + val + '%</span>' +
    '</div>' +
    '<div class="smart-brightness"><div class="smart-brightness-fill" style="width:' + val + '%"></div></div>';
  }

  if (action === 'set_color') {
    const target = args.target || 'Light';
    const color = args.value || '';
    return '<div class="smart-status">' +
      '<div class="smart-dot on" style="background:' + escapeHtml(color) + ';box-shadow:0 0 6px ' + escapeHtml(color) + '88"></div>' +
      '<span class="smart-target">' + escapeHtml(target) + '</span>' +
      '<span class="smart-state">' + escapeHtml(color) + '</span>' +
    '</div>';
  }

  // List lights/rooms/scenes
  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

// --- Reminders ---
function renderRemindersBody(args, result) {
  if (args.action === 'add') {
    return '<div class="reminder-added">' +
      '<span class="reminder-check">\u2610</span>' +
      '<span>' + escapeHtml(args.title || result) + '</span>' +
      (args.due ? '<span class="reminder-due">' + escapeHtml(args.due) + '</span>' : '') +
    '</div>';
  }

  // View reminders - format lines as a list
  const lines = result.split('\n').filter(function(l) { return l.trim(); });
  if (lines.length > 1) {
    return '<div class="reminder-list">' +
      lines.map(function(l) {
        return '<div class="reminder-item">' +
          '<span class="reminder-check">\u2610</span>' +
          '<span>' + escapeHtml(l.trim()) + '</span>' +
        '</div>';
      }).join('') +
    '</div>';
  }

  return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
}

// --- Notes ---
function renderNotesBody(args, result) {
  if (args.action === 'create') {
    return '<div class="note-inner">' +
      '<div class="note-title">' + escapeHtml(args.title || 'Untitled') + '</div>' +
      (args.body ? '<div class="note-preview">' + escapeHtml(args.body) + '</div>' : '') +
    '</div>';
  }

  // List/search results
  const lines = result.split('\n').filter(function(l) { return l.trim(); });
  if (lines.length > 1) {
    return '<div class="notes-list">' +
      lines.map(function(l) {
        return '<div class="notes-list-item">\uD83D\uDCC4 ' + escapeHtml(l.trim()) + '</div>';
      }).join('') +
    '</div>';
  }

  return '<div class="tool-result-text">' + escapeHtml(result) + '</div>';
}

// --- Summarize ---
function renderSummarizeBody(args, result) {
  let header = '';
  if (args.url) {
    const domain = getDomain(args.url);
    const isYT = args.url.includes('youtube.com') || args.url.includes('youtu.be');
    header = '<div class="summary-source">' +
      (isYT ? '\u25B6 YouTube \u2022 ' : '') + escapeHtml(domain) +
    '</div>';
  }
  return header + '<div class="tool-result-text summary-text">' + escapeHtml(result) + '</div>';
}

// --- Messaging ---
function renderMessagingBody(args, result) {
  if (args.action === 'send') {
    return '<div class="msg-sent">' +
      '<div class="msg-to">To: ' + escapeHtml(args.to || 'Unknown') + '</div>' +
      '<div class="msg-bubble">' + escapeHtml(args.text || '') + '</div>' +
      '<div class="msg-status-sent">\u2713 Sent</div>' +
    '</div>';
  }

  // Chat history - try to format sender: text pairs
  if (args.action === 'read_chat' && result.includes(':')) {
    const lines = result.split('\n').filter(function(l) { return l.trim(); });
    if (lines.length > 1) {
      return '<div class="msg-history">' +
        lines.map(function(l) {
          const m = l.trim().match(/^\s*(You|Them|[^:]+):\s*(.+)/);
          if (m) {
            return '<div class="msg-history-item">' +
              '<span class="msg-sender">' + escapeHtml(m[1]) + '</span>' +
              escapeHtml(m[2]) +
            '</div>';
          }
          return '<div class="msg-history-item">' + escapeHtml(l.trim()) + '</div>';
        }).join('') +
      '</div>';
    }
  }

  return '<pre class="tool-result-text">' + escapeHtml(result) + '</pre>';
}

// ---------------------------------------------------------------------------
// Tool action buttons
// ---------------------------------------------------------------------------
function renderToolActions(name, args) {
  switch (name) {
    case 'music_control':
      return '<button onclick="quickAction(\'play the previous track\')">\u23EE</button>' +
        '<button onclick="quickAction(\'pause the music\')">\u23EF</button>' +
        '<button onclick="quickAction(\'skip to the next track\')">\u23ED</button>' +
        '<button onclick="quickAction(\'what song is currently playing\')">\uD83C\uDFB5 Now</button>';

    case 'smart_home':
      if (args.target && (args.action === 'turn_on' || args.action === 'turn_off')) {
        const opposite = args.action === 'turn_on' ? 'turn off' : 'turn on';
        return '<button onclick="quickAction(\'' + opposite + ' ' + escapeHtml(args.target).replace(/'/g,"\\'") + '\')">' +
          (args.action === 'turn_on' ? 'Turn Off' : 'Turn On') + '</button>';
      }
      return null;

    case 'reminders':
      if (args.action !== 'add') {
        return '<button onclick="quickAction(\'show today\\\'s reminders\')">Today</button>' +
          '<button onclick="quickAction(\'show overdue reminders\')">Overdue</button>';
      }
      return null;

    case 'notes':
      if (args.action !== 'create') {
        return '<button onclick="quickAction(\'list my notes\')">All Notes</button>';
      }
      return null;

    default:
      return null;
  }
}

function getDomain(url) {
  try { return new URL(url).hostname; } catch(e) { return url; }
}

// ---------------------------------------------------------------------------
// Quick Actions
// ---------------------------------------------------------------------------
function quickAction(text) {
  if (!ws || ws.readyState !== 1 || isProcessing) return;
  ws.send(JSON.stringify({ type: 'text_input', text: text }));
  isProcessing = true;
  updateMicState();
}

document.querySelectorAll('.qa-btn[data-cmd]').forEach(function(btn) {
  btn.addEventListener('click', function() {
    quickAction(btn.dataset.cmd);
  });
});

// ---------------------------------------------------------------------------
// Text input
// ---------------------------------------------------------------------------
sendBtn.addEventListener('click', sendText);
textInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

function sendText() {
  const t = textInput.value.trim();
  if (!t || !ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'text_input', text: t, model: modelSelect.value }));
  textInput.value = '';
  isProcessing = true;
  updateMicState();
}

// ---------------------------------------------------------------------------
// Model select
// ---------------------------------------------------------------------------
modelSelect.addEventListener('change', function() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_model', model: modelSelect.value }));
  }
});

// ---------------------------------------------------------------------------
// Clear
// ---------------------------------------------------------------------------
clearBtn.addEventListener('click', function() {
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'clear' }));
  }
});

// ---------------------------------------------------------------------------
// Audio capture
// ---------------------------------------------------------------------------
async function startListening() {
  if (isListening) return;
  try {
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch (err) {
    addMessage('error', 'Microphone access denied.');
    return;
  }

  audioCtx = new AudioContext();
  const src = audioCtx.createMediaStreamSource(micStream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 512;
  src.connect(analyser);

  isListening = true;
  updateMicState();
  setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Click mic to record');
  monitorVolume();
}

function stopListening() {
  isListening = false;
  clearTimeout(silenceTimer);
  silenceTimer = null;

  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
  if (micStream) {
    micStream.getTracks().forEach(function(t) { t.stop(); });
    micStream = null;
  }
  if (audioCtx) {
    audioCtx.close();
    audioCtx = null;
    analyser = null;
  }

  isRecording = false;
  volumeFill.style.width = '0%';
  updateMicState();
  setStatus('Ready');
}

// ---------------------------------------------------------------------------
// VAD + volume monitoring
// ---------------------------------------------------------------------------
function monitorVolume() {
  if (!isListening || !analyser) return;

  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  const rms = Math.sqrt(data.reduce(function(a, v) { return a + v * v; }, 0) / data.length);

  const pct = Math.min(100, (rms / 80) * 100);
  volumeFill.style.width = pct + '%';

  const threshold = parseInt(sensitivitySlider.value);
  thresholdLine.style.left = Math.min(100, (threshold / 80) * 100) + '%';

  if (alwaysOnToggle.checked && !isProcessing) {
    vadLogic(rms, threshold);
  }

  requestAnimationFrame(monitorVolume);
}

function vadLogic(rms, threshold) {
  if (rms > threshold && !isRecording) {
    vadSpeechStart = Date.now();
    startRecording();
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms > threshold && isRecording) {
    clearTimeout(silenceTimer);
    silenceTimer = null;
  }

  if (rms <= threshold && isRecording && !silenceTimer) {
    silenceTimer = setTimeout(function() {
      const duration = Date.now() - vadSpeechStart;
      if (duration >= MIN_SPEECH_MS) {
        stopRecording();
      } else {
        cancelRecording();
      }
      silenceTimer = null;
    }, SILENCE_MS);
  }
}

// ---------------------------------------------------------------------------
// MediaRecorder
// ---------------------------------------------------------------------------
function startRecording() {
  if (isRecording || !micStream) return;
  isRecording = true;
  updateMicState();

  const types = ['audio/webm;codecs=opus', 'audio/webm', 'audio/ogg', 'audio/mp4', ''];
  let mimeType = '';
  for (const t of types) {
    if (!t || MediaRecorder.isTypeSupported(t)) { mimeType = t; break; }
  }

  const opts = mimeType ? { mimeType: mimeType } : {};
  mediaRecorder = new MediaRecorder(micStream, opts);

  mediaRecorder.ondataavailable = function(e) {
    if (e.data.size > 0 && ws && ws.readyState === 1) {
      ws.send(e.data);
    }
  };

  mediaRecorder.onstop = function() {
    if (ws && ws.readyState === 1) {
      ws.send(JSON.stringify({ type: 'audio_end' }));
    }
  };

  mediaRecorder.start(250);
}

function stopRecording() {
  if (!isRecording || !mediaRecorder) return;
  isRecording = false;
  isProcessing = true;
  updateMicState();

  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

function cancelRecording() {
  if (!mediaRecorder) return;
  isRecording = false;
  updateMicState();

  mediaRecorder.ondataavailable = null;
  mediaRecorder.onstop = null;
  if (mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  }
}

// ---------------------------------------------------------------------------
// Mic button
// ---------------------------------------------------------------------------
micBtn.addEventListener('click', async function() {
  if (isProcessing) return;

  if (isRecording) {
    stopRecording();
    return;
  }

  if (alwaysOnToggle.checked) {
    if (isListening) {
      stopListening();
    } else {
      await startListening();
    }
    return;
  }

  if (!isListening) {
    await startListening();
    if (!isListening) return;
  }
  startRecording();
  if (isRecording) {
    setStatus('Recording... click mic to send');
  }
});

// ---------------------------------------------------------------------------
// TTS
// ---------------------------------------------------------------------------
function speak(text) {
  if (!('speechSynthesis' in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.1;
  window.speechSynthesis.speak(u);
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setStatus(text) {
  if (text === 'idle') text = isListening ? 'Listening...' : 'Ready';
  statusText.textContent = text;
}

function updateMicState() {
  micBtn.classList.remove('listening', 'recording', 'processing');
  if (isProcessing) {
    micBtn.classList.add('processing');
    micBtn.title = 'Processing...';
  } else if (isRecording) {
    micBtn.classList.add('recording');
    micBtn.title = 'Click to send';
  } else if (isListening) {
    micBtn.classList.add('listening');
    micBtn.title = alwaysOnToggle.checked
      ? 'Listening (auto-detect speech)'
      : 'Click to record';
  } else {
    micBtn.title = 'Click to record';
  }
}

// Persist settings
alwaysOnToggle.checked = localStorage.getItem('alwaysOn') === 'true';
sensitivitySlider.value = localStorage.getItem('sensitivity') || '15';
ttsToggle.checked = localStorage.getItem('tts') === 'true';
thinkToggle.checked = localStorage.getItem('autoThink') === 'true';
if (localStorage.getItem('model')) {
  modelSelect.value = localStorage.getItem('model');
}

alwaysOnToggle.addEventListener('change', function() {
  localStorage.setItem('alwaysOn', alwaysOnToggle.checked);
  if (alwaysOnToggle.checked && !isListening) {
    startListening();
  }
  if (isListening) {
    setStatus(alwaysOnToggle.checked ? 'Listening (auto)...' : 'Hold mic or spacebar to talk');
  }
  updateMicState();
});
sensitivitySlider.addEventListener('input', function() {
  localStorage.setItem('sensitivity', sensitivitySlider.value);
});
ttsToggle.addEventListener('change', function() {
  localStorage.setItem('tts', ttsToggle.checked);
});
thinkToggle.addEventListener('change', function() {
  localStorage.setItem('autoThink', thinkToggle.checked);
  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'set_auto_think', enabled: thinkToggle.checked }));
  }
});
modelSelect.addEventListener('change', function() {
  localStorage.setItem('model', modelSelect.value);
});

// ---------------------------------------------------------------------------
// Init
// ---------------------------------------------------------------------------
connectWS();
</script>
